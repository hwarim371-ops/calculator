  apiKey: "AIzaSyBxxxxxxx_xxxxxxxxxxxxxx",

};

        items: [

          { id: 2, name: "노랑", spec: "2550*3200", unit: "장", qty: 4, unitPrice: 60000, total: 240000 },
          { id: 3, name: "베이지-SOL", spec: "2950*3000", unit: "장", qty: 4, unitPrice: 90000, total: 360000 },
          { id: 4, name: "투명", spec: "2450*3000", unit: "장", qty: 4, unitPrice: 80000, total: 320000 },

          { id: 7, name: "노랑", spec: "700*2300", unit: "장", qty: 6, unitPrice: 120000, total: 72000 },

        ]
      }
    ];

    const formatCurrency = (num) => new Intl.NumberFormat('ko-KR').format(Math.round(num));
    const formatDate = (ts) => {
      if (!ts) return "";
      const d = new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    };

    function App() {
      const [view, setView] = useState('upload'); // 'upload', 'dashboard', 'calculator'
      const [isDragging, setIsDragging] = useState(false);
      const [selectedCompanyId, setSelectedCompanyId] = useState(null);
      
      const [toastMessage, setToastMessage] = useState('');
      const [previewImage, setPreviewImage] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      
      const dashboardRef = useRef(null);

      // 데이터 상태
      const [quotes, setQuotes] = useState(initialQuoteData);
      const [historyData, setHistoryData] = useState([]); // 클라우드에 저장된 과거 내역
      const [user, setUser] = useState(null);

      // 모달 상태
      const [isSaveModalOpen, setIsSaveModalOpen] = useState(false);
      const [analysisTitle, setAnalysisTitle] = useState('');

      // --- [Firebase Auth & Data Sync] ---
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth error:", err);
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // 과거 분석 내역 불러오기
      useEffect(() => {
        if (!user || !db) return;
        const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'analyses');
        
        const unsubscribe = onSnapshot(historyRef, (snapshot) => {
          if (!snapshot.empty) {
            const fetched = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // JavaScript 메모리상에서 최신순(내림차순) 정렬
            fetched.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            setHistoryData(fetched);
          } else {
            setHistoryData([]);
          }
        }, (error) => {
          console.error("Firestore Error:", error);
        });
        
        return () => unsubscribe();
      }, [user]);

      const { lowestQuote, highestQuote, maxSaving } = useMemo(() => {
        if (!quotes || quotes.length === 0) return {};
        const sorted = [...quotes].sort((a, b) => a.total - b.total);
        const lowest = sorted[0];
        const highest = sorted[sorted.length - 1];
        return {
          lowestQuote: lowest,
          highestQuote: highest,
          maxSaving: highest.total - lowest.total
        };
      }, [quotes]);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3500);
      };

      // ☁️ 새로운 "분석 결과 저장" (과거 내역 생성)
      const handleSaveAnalysis = async () => {
        if (!analysisTitle.trim()) {
          showToast("저장할 분석 결과의 제목을 입력해주세요.");
          return;
        }
        if (!auth || !db) {
          showToast("클라우드 설정이 필요합니다! (API 키 입력 필요)");
          return;
        }
        if (!user) {
          showToast("사용자 인증 중입니다. 잠시 후 시도해주세요.");
          return;
        }

        setIsProcessing(true);
        setIsSaveModalOpen(false);
        showToast("분석 데이터를 클라우드에 저장 중입니다...");

        try {
          // 새로운 고유 ID 생성 (Timestamp 기반)
          const newId = Date.now().toString();
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'analyses', newId);
          
          await setDoc(docRef, {
            title: analysisTitle,
            createdAt: Date.now(),
            quotes: quotes, // 전체 견적 데이터 통째로 저장
          });
          
          setAnalysisTitle('');
          showToast(`'${analysisTitle}' 견적이 보관함에 저장되었습니다.`);
        } catch (err) {
          console.error("Save error:", err);
          showToast("저장 중 오류가 발생했습니다.");
        } finally {
          setIsProcessing(false);
        }
      };

      // 새 파일 업로드 클릭 시 (더미 데이터로 리셋하고 대시보드 이동)
      const handleNewUpload = () => {
        setQuotes(initialQuoteData);
        setView('dashboard');
      };

      // 과거 내역 불러오기
      const handleLoadHistory = (historyItem) => {
        setQuotes(historyItem.quotes);
        setView('dashboard');
        showToast(`'${historyItem.title}' 데이터를 불러왔습니다.`);
      };

      const handleUpdateQuote = (updatedCompany) => {
        setQuotes(prev => prev.map(q => q.id === updatedCompany.id ? updatedCompany : q));
        showToast(`${updatedCompany.name} 견적 내용 갱신 완료!`);
        setView('dashboard');
      };

        if (!dashboardRef.current) return;
        if (!window.html2canvas) {
          showToast("캡처 모듈을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
          return;
        }
        setIsProcessing(true);
        showToast("대시보드를 이미지로 변환 중...");

        try {
          const canvas = await window.html2canvas(dashboardRef.current, { scale: 2, backgroundColor: '#f8fafc', useCORS: true });
          canvas.toBlob(async (blob) => {
            try {
              await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
              showToast("클립보드에 대시보드가 복사되었습니다. (Ctrl+V로 붙여넣기)");
              setIsProcessing(false);
            } catch (err) {
              const dataUrl = canvas.toDataURL("image/png");
              setPreviewImage(dataUrl);
              setIsProcessing(false);
            }
          }, "image/png");
        } catch (error) {
          showToast("이미지 캡처 중 오류가 발생했습니다.");
          setIsProcessing(false);
        }
      };

      const handleDownloadHTML = () => {
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob(["<!DOCTYPE html>\n" + htmlContent], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '화림건설_견적분석기.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("독립 실행 가능한 HTML 앱이 다운로드 되었습니다!");

        return (

                <p className="text-slate-500 mb-8 relative z-10">견적서 파일(PDF, Excel, 이미지)을 업로드하여 자동으로 비교 분석하세요.</p>
                
                <div 
                  className={`border-2 border-dashed rounded-xl p-16 transition-colors cursor-pointer relative z-10
                    ${isDragging ? 'border-blue-500 bg-blue-50' : 'border-slate-300 bg-slate-50 hover:bg-slate-100'}`}
                  onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                  onDragLeave={() => setIsDragging(false)}
                  onDrop={(e) => { e.preventDefault(); setIsDragging(false); handleNewUpload(); }}
                  onClick={handleNewUpload}
                >
                  <UploadCloud className="mx-auto text-slate-400 mb-4" size={48} />
                  <p className="text-lg font-medium text-slate-700">파일을 이곳에 드래그하거나 클릭하여 새 분석 시작</p>
                  <p className="text-sm text-slate-400 mt-2">지원 파일: PDF, JPG, PNG, XLSX (최대 5개)</p>
                </div>

            const updated = { ...item, [field]: Number(value) };
            if (field === 'qty' || field === 'unitPrice') updated.total = updated.qty * updated.unitPrice;
            return updated;
          }
          return item;
        }));

      const calculatedTotal = calculatedTotalSupply + calculatedVat;

                          <td className="p-3 text-sm text-center text-slate-500">{item.unit}</td>
                          <td className="p-3 text-right"><input type="number" value={item.qty} onChange={(e) => handleItemChange(item.id, 'qty', e.target.value)} className="w-16 p-1 border border-slate-200 rounded text-right focus:ring-1 focus:ring-blue-500" /></td>
                          <td className="p-3 text-right"><input type="number" value={item.unitPrice} onChange={(e) => handleItemChange(item.id, 'unitPrice', e.target.value)} className="w-28 p-1 border border-slate-200 rounded text-right focus:ring-1 focus:ring-blue-500" /></td>
                          <td className="p-3 text-right font-medium text-slate-700">{formatCurrency(item.total)}</td>
                          <td className="p-3 text-right font-bold text-blue-600 bg-blue-50/30">{formatCurrency(item.total / baseArea)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-4 items-center">
                  <span className="text-slate-500 text-sm">합계:</span><span className="text-xl font-bold text-slate-800">₩ {formatCurrency(calculatedTotalSupply)}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // React 18 마운트
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body></html>
