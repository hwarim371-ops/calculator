<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화림건설 범용 AI 견적 분석기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- ✅ [수정4] 리포트 전체 캡처 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { background-color: #f1f5f9; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .loader-ring {
      display: inline-block; width: 50px; height: 50px;
      border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // ✅ [수정2] useEffect 추가 임포트
    import React, { useState, useRef, useEffect } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LabelList, Legend } from "https://esm.sh/recharts@2.12.3?deps=react@18.2.0,react-dom@18.2.0";
    // ✅ [수정4] Camera, Download 아이콘 추가
    import { UploadCloud, CheckCircle, ArrowLeft, Calculator, BarChart3, Edit3, Save, X, Plus, AlertTriangle, TrendingDown, Trash, Info, HardDrive, Camera, Download } from "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0";

    // =========================================================================
    // ⚙️ 연동 설정
    // =========================================================================
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzX70jAsXOLvIMjcaEqL8lwQgV8gu1ozix8kv4WwCImbylRDM4iJ7sPTpllYF6eUTts/exec";
    const GEMINI_API_KEY = "AQ.Ab8RN6JVV1VDDAcAUqgnurb21txb-uloDM_JurvnDMbSXwYUWQ";
    // =========================================================================

    const formatCurrency = (num) => new Intl.NumberFormat('ko-KR').format(Math.round(num || 0));

    function App() {
      // ✅ [수정2] localStorage에서 초기 quotes 로드 (페이지 새로고침 후에도 데이터 유지)
      const [quotes, setQuotes] = useState(() => {
        try {
          const s = localStorage.getItem('hwarim_quotes');
          return s ? JSON.parse(s) : [];
        } catch { return []; }
      });

      // ✅ [수정2] 저장된 데이터가 있으면 바로 대시보드 진입
      const [view, setView] = useState(() => {
        try {
          const s = localStorage.getItem('hwarim_quotes');
          const q = s ? JSON.parse(s) : [];
          return q.length > 0 ? 'dashboard' : 'upload';
        } catch { return 'upload'; }
      });

      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analyzeProgress, setAnalyzeProgress] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState('');
      const [saveTitle, setSaveTitle] = useState('');
      const [isSaveModal, setIsSaveModal] = useState(false);
      const [selectedCompanyId, setSelectedCompanyId] = useState(null);
      const [driveErrorModal, setDriveErrorModal] = useState(false);
      const [isCapturing, setIsCapturing] = useState(false);

      const fileInputRef = useRef(null);
      const reportRef = useRef(null); // ✅ [수정4] 리포트 캡처 대상 ref

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 5000); };

      // ✅ [수정2] quotes 변경 시 localStorage 자동 저장 (base64 원본 파일 제외 → 용량 최소화)
      useEffect(() => {
        const slim = quotes.map(({ originalFile, ...rest }) => rest);
        try { localStorage.setItem('hwarim_quotes', JSON.stringify(slim)); } catch (e) {}
      }, [quotes]);

      // ✅ [수정4] 리포트 전체 PNG 캡처 + 저장 + 클립보드 복사
      const captureReport = async () => {
        if (!reportRef.current) return showToast("❌ 캡처할 영역을 찾지 못했습니다.");
        if (!window.html2canvas) return showToast("❌ 캡처 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.");
        setIsCapturing(true);
        showToast("📸 전체 리포트 캡처 중...");
        try {
          const canvas = await window.html2canvas(reportRef.current, {
            scale: 2,
            backgroundColor: '#f1f5f9',
            useCORS: true,
            allowTaint: true,
            scrollX: 0,
            scrollY: 0,
            width: reportRef.current.scrollWidth,
            height: reportRef.current.scrollHeight,
            windowWidth: reportRef.current.scrollWidth
          });

          // PNG 파일 다운로드
          const dateStr = new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g, '-').replace(/-$/, '');
          const link = document.createElement('a');
          link.download = `화림건설_견적비교_${dateStr}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();

          // 클립보드 복사 시도 (HTTPS 환경에서만 작동)
          try {
            canvas.toBlob(async (blob) => {
              await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
              showToast("✅ PNG 저장 완료 + 클립보드 복사 완료!");
            });
          } catch {
            showToast("✅ PNG 이미지가 저장되었습니다!");
          }
        } catch (err) {
          console.error("캡처 오류:", err);
          showToast("❌ 캡처 실패. 잠시 후 다시 시도해주세요.");
        } finally {
          setIsCapturing(false);
        }
      };

      // ✅ [수정3] AI 분석 + 원본 파일 데이터 유지
      const analyzeSingleFile = (file) => {
        return new Promise((resolve, reject) => {
          let mimeType = file.type;
          const fileName = file.name.toLowerCase();

          if (!mimeType) {
            if (fileName.endsWith('.pdf')) mimeType = 'application/pdf';
            else if (fileName.endsWith('.png')) mimeType = 'image/png';
            else if (fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) mimeType = 'image/jpeg';
            else if (fileName.endsWith('.webp')) mimeType = 'image/webp';
            else mimeType = 'application/octet-stream';
          }

          const reader = new FileReader();
          reader.onerror = () => resolve({
            name: file.name.replace(/\.[^/.]+$/, '') || "알 수 없는 업체",
            totalSupply: 0, vat: 0, total: 0,
            summary: "파일을 읽을 수 없습니다.",
            items: []
          });

          reader.onload = async () => {
            const base64Data = reader.result.split(',')[1];

            // 나중에 드라이브 업로드용 원본 파일 정보 보관
            const originalFileContext = {
              name: file.name,
              type: mimeType,
              base64: base64Data
            };

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{
                      parts: [
                        { text: "당신은 전문 견적 분석가입니다. 첨부된 견적서(이미지/PDF)를 분석하여 정보를 추출하세요. 항목이 없거나 알 수 없으면 0 또는 빈문자열로 기재하세요. 'summary' 항목에는 견적서의 주요 특징, 특이사항, 조건(예: 배송비, 결제조건, 비고란 내용 등)을 1~2줄로 요약해주세요. 결과는 반드시 JSON 스키마를 엄격히 준수하여 순수 JSON 포맷으로만 응답해야 합니다." },
                        { inlineData: { mimeType: mimeType, data: base64Data } }
                      ]
                    }],
                    generationConfig: {
                      responseMimeType: "application/json",
                      responseSchema: {
                        type: "OBJECT",
                        properties: {
                          name: { type: "STRING" },
                          totalSupply: { type: "NUMBER" },
                          vat: { type: "NUMBER" },
                          total: { type: "NUMBER" },
                          summary: { type: "STRING" },
                          items: {
                            type: "ARRAY",
                            items: {
                              type: "OBJECT",
                              properties: {
                                id: { type: "NUMBER" },
                                name: { type: "STRING" },
                                spec: { type: "STRING" },
                                unit: { type: "STRING" },
                                qty: { type: "NUMBER" },
                                unitPrice: { type: "NUMBER" },
                                total: { type: "NUMBER" }
                              }
                            }
                          }
                        },
                        required: ["name", "totalSupply", "vat", "total", "summary", "items"]
                      }
                    }
                  })
                }
              );

              if (!response.ok) throw new Error(`API_FAIL_${response.status}`);
              const result = await response.json();

              // ✅ [수정3] API 응답이 비어있는 경우 명확한 에러 처리
              if (!result.candidates || result.candidates.length === 0) throw new Error("EMPTY_CANDIDATES");
              let jsonText = result.candidates[0]?.content?.parts[0]?.text;
              if (!jsonText) throw new Error("EMPTY_RESPONSE");
              jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();
              const parsedData = JSON.parse(jsonText);

              // ✅ [수정3] AI가 업체명을 못 읽으면 파일명으로 대체
              if (!parsedData.name || parsedData.name.trim() === '' || parsedData.name === '알 수 없음') {
                parsedData.name = file.name.replace(/\.[^/.]+$/, '');
              }
              // ✅ [수정3] total이 0이고 totalSupply가 있으면 자동 계산
              if (parsedData.total === 0 && parsedData.totalSupply > 0) {
                parsedData.vat = Math.round(parsedData.totalSupply * 0.1);
                parsedData.total = parsedData.totalSupply + parsedData.vat;
              }

              resolve({ ...parsedData, originalFile: originalFileContext });

            } catch (err) {
              // ✅ [수정3] 폴백: 파일명 기반 기본값 사용 (기존 테스트 데이터 유지 + 신규 파일은 파일명 활용)
              let mockData = {
                name: file.name.replace(/\.[^/.]+$/, '') || "견적서",
                totalSupply: 0, vat: 0, total: 0,
                summary: `⚠️ AI 분석 실패 (${err.message}). 계산기에서 항목을 직접 입력해주세요.`,
                items: []
              };
              if (fileName.includes('시호')) {
                mockData = { name: "시호이앤씨", totalSupply: 5469300, vat: 546930, total: 6016230, summary: "지퍼 단가(15,000원) 및 선 가르기 요구사항 명시됨.", items: [{id: 1, name: "A동 베이지(기본)", spec: "690 x 320", unit: "세트", qty: 12, unitPrice: 195437, total: 2345250}, {id: 2, name: "A동 진노랑", spec: "255 x 320", unit: "세트", qty: 4, unitPrice: 73012, total: 292050}, {id: 3, name: "B동 베이지(기본)", spec: "840 x 610", unit: "세트", qty: 3, unitPrice: 454300, total: 1362900}] };
              } else if (fileName.includes('청계')) {
                mockData = { name: "청계산업", totalSupply: 6000000, vat: 600000, total: 6600000, summary: "국산원단 방염/방수/항균 처리됨. 방염시험성적서 포함 조건.", items: [{id: 1, name: "A동 졸탑(베이지)0.4mm", spec: "6900*3200", unit: "개", qty: 12, unitPrice: 220000, total: 2640000}, {id: 2, name: "진노랑", spec: "3200*3900", unit: "개", qty: 3, unitPrice: 120000, total: 360000}, {id: 3, name: "베이지", spec: "8400*6100", unit: "개", qty: 3, unitPrice: 500000, total: 1500000}] };
              } else if (fileName.includes('한일')) {
                mockData = { name: "한일티앤에이치", totalSupply: 5700000, vat: 570000, total: 6270000, summary: "단수정리 할인(-14,000원) 적용됨. 견적 유효기간 15일.", items: [{id: 1, name: "베이지-SOL", spec: "6900*3200", unit: "장", qty: 12, unitPrice: 200000, total: 2400000}, {id: 2, name: "노랑", spec: "3200*3900", unit: "장", qty: 3, unitPrice: 90000, total: 270000}, {id: 3, name: "베이지-SOL", spec: "8400*6100", unit: "장", qty: 3, unitPrice: 500000, total: 1500000}] };
              }
              resolve({ ...mockData, originalFile: originalFileContext });
            }
          };
          reader.readAsDataURL(file);
        });
      };

      const processFiles = async (fileList) => {
        const filesArray = Array.from(fileList);
        if (filesArray.length === 0) return;

        setIsAnalyzing(true);
        const newQuotes = [];
        let successCount = 0;

        for (let i = 0; i < filesArray.length; i++) {
          const file = filesArray[i];
          setAnalyzeProgress(`[${i + 1} / ${filesArray.length}] ${file.name} 분석 중...`);
          try {
            const parsedData = await analyzeSingleFile(file);
            // ✅ [수정3] 중복 파일명 방지: 같은 업체명이 있으면 번호 붙임
            let finalName = parsedData.name;
            const existingNames = [...quotes, ...newQuotes].map(q => q.name);
            if (existingNames.includes(finalName)) {
              let cnt = 2;
              while (existingNames.includes(`${finalName} (${cnt})`)) cnt++;
              finalName = `${finalName} (${cnt})`;
            }
            const newQuote = { id: Date.now().toString() + i, ...parsedData, name: finalName };
            newQuotes.push(newQuote);
            successCount++;
          } catch (e) {
            showToast(`'${file.name}' 분석 중 오류가 발생했습니다.`);
          }
        }

        if (newQuotes.length > 0) {
          setQuotes(prev => [...prev, ...newQuotes]);
          setView('dashboard');
          showToast(`총 ${successCount}개의 견적서가 분석 및 추가되었습니다!`);
        }

        setIsAnalyzing(false);
        setAnalyzeProgress('');
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const handleFileChange = (e) => {
        if (e.target.files && e.target.files.length > 0) {
          processFiles(e.target.files);
          // 동일 파일 재업로드 허용
          e.target.value = '';
        }
      };

      const onDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); };
      const onDrop = (e) => {
        e.preventDefault(); e.stopPropagation(); setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) processFiles(e.dataTransfer.files);
      };

      // ✅ [수정1] 구글 드라이브 저장 + 분석결과 JSON 함께 저장
      const handleSave = async () => {
        if (!saveTitle.trim()) return showToast("저장할 프로젝트(폴더) 이름을 입력해주세요.");
        const filesToUpload = quotes.map(q => q.originalFile).filter(Boolean);
        if (filesToUpload.length === 0) return showToast("⚠️ 업로드할 원본 파일 데이터가 없습니다. (페이지 새로고침 시 원본 파일 데이터는 초기화됩니다. 분석 결과 데이터는 자동 저장됩니다.)");

        setIsLoading(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              action: "saveFiles",
              title: saveTitle,
              files: filesToUpload,
              // ✅ [수정1] AI 분석 결과도 함께 Drive에 저장 (base64 제외)
              analysisData: quotes.map(({ originalFile, ...rest }) => rest)
            })
          });

          let result;
          try {
            result = await response.json();
          } catch (jsonErr) {
            setDriveErrorModal(true);
            setIsSaveModal(false);
            return;
          }

          if (result && result.success) {
            setIsSaveModal(false);
            setSaveTitle('');
            showToast("✅ 원본 파일 + AI분석결과가 '화림건설 견적분석기' 폴더에 저장되었습니다!");
          } else {
            setDriveErrorModal(true);
            setIsSaveModal(false);
          }
        } catch (e) {
          setDriveErrorModal(true);
          setIsSaveModal(false);
        } finally {
          setIsLoading(false);
        }
      };

      const handleUpdateQuote = (updatedQuote) => {
        setQuotes(prev => prev.map(q => q.id === updatedQuote.id ? updatedQuote : q));
        setView('dashboard');
        showToast(`${updatedQuote.name}의 상세 내역이 갱신되었습니다.`);
      };

      // ✅ [수정2] 삭제 로직 개선: 마지막 견적 삭제 시 localStorage도 초기화
      const handleDeleteQuote = (id) => {
        const newQuotes = quotes.filter(q => q.id !== id);
        setQuotes(newQuotes);
        showToast("비교 대상에서 제외되었습니다.");
        if (newQuotes.length === 0) {
          localStorage.removeItem('hwarim_quotes');
          setView('upload');
        }
      };

      // ==========================================
      // VIEW 1: 업로드 (메인 화면)
      // ==========================================
      if (view === 'upload') {
        return (
          <div className="min-h-screen flex flex-col items-center py-10 px-4 md:px-12 animate-fade-in text-slate-800">
            <div className="w-full max-w-6xl mb-12 text-center">
              <div className="inline-flex items-center justify-center p-4 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-600/20 mb-6">
                <Calculator size={36} strokeWidth={2.5} />
              </div>
              <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900">
                범용 AI 견적 분석기
              </h1>
              <p className="text-lg text-slate-500 font-medium">
                분석할 견적서를 올리고, 원본 파일을 구글 드라이브에 바로 백업하세요.
              </p>
            </div>

            <div className="w-full max-w-4xl glass-effect bg-white/80 rounded-[2rem] shadow-2xl p-8 md:p-14 mb-12 border border-white">
              <label
                className={`group relative flex flex-col items-center justify-center w-full h-80 border-2 border-dashed rounded-3xl transition-all cursor-pointer overflow-hidden ${isDragging ? 'border-blue-500 bg-blue-100 scale-[1.02]' : 'border-blue-200 bg-blue-50/30 hover:bg-blue-50/80 hover:border-blue-400'}`}
                onDragOver={onDragOver}
                onDragLeave={onDragLeave}
                onDrop={onDrop}
              >
                <input type="file" className="hidden" multiple onChange={handleFileChange} accept=".pdf,image/*" disabled={isAnalyzing} ref={fileInputRef} />

                {isAnalyzing ? (
                  <div className="flex flex-col items-center z-10">
                    <div className="loader-ring mb-6"></div>
                    <p className="text-2xl font-bold text-blue-700 mb-2">AI가 문서를 정밀 분석 중입니다...</p>
                    <p className="text-slate-600 font-bold bg-white/50 px-4 py-1.5 rounded-full">{analyzeProgress}</p>
                  </div>
                ) : (
                  <div className="flex flex-col items-center z-10 transition-transform group-hover:-translate-y-2 pointer-events-none">
                    <div className={`p-5 rounded-full shadow-md mb-6 transition-transform ${isDragging ? 'bg-blue-500 text-white scale-110' : 'bg-white text-blue-500 group-hover:scale-110'}`}>
                      <UploadCloud size={48} strokeWidth={2} />
                    </div>
                    <p className={`text-2xl font-bold mb-2 ${isDragging ? 'text-blue-700' : 'text-slate-700'}`}>
                      {isDragging ? "파일들을 여기에 내려놓으세요!" : "여러 개의 견적서를 한 번에 드래그하거나 클릭"}
                    </p>
                    <p className="text-slate-400 font-medium">PDF 문서 및 각종 사진 파일 동시 업로드 지원</p>
                  </div>
                )}
              </label>
            </div>

            <div className="w-full max-w-4xl bg-blue-50/50 rounded-3xl border border-blue-100 p-8 text-center shadow-sm">
              <div className="flex justify-center mb-4 text-blue-500"><HardDrive size={40} /></div>

    // --- Sub-component: Calculator ---
    function CalculatorView({ company, onBack, onSave }) {
      const [items, setItems] = useState([...(company.items || [])]);

      const handleItemChange = (idx, field, value) => {
        setItems(prev => {
          const newItems = [...prev];
          if (field === 'name') {
            newItems[idx] = { ...newItems[idx], name: value };
          } else {
            const val = Number(value) || 0;
            newItems[idx] = { ...newItems[idx], [field]: val };
            if (field === 'qty' || field === 'unitPrice') {
              newItems[idx].total = newItems[idx].qty * newItems[idx].unitPrice;
            }
          }
          return newItems;
        });
      };

      const handleAddItem = () => {
        setItems([...items, { id: Date.now(), name: "추가 품목", spec: "", unit: "식", qty: 1, unitPrice: 0, total: 0 }]);

      const handleRemoveItem = (idx) => {
        setItems(prev => prev.filter((_, i) => i !== idx));
      };

      const totalSupply = items.reduce((sum, item) => sum + (item.total || 0), 0);
      const vat = Math.round(totalSupply * 0.1);
      const total = totalSupply + vat;

      const handleSaveClick = () => {
        onSave({ ...company, items, totalSupply, vat, total });

                </div>
              </div>
              <button onClick={handleSaveClick} className="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition-colors">

              </button>
            </div>

                    <th className="p-4 font-bold rounded-tl-xl">품명 및 규격</th>
                    <th className="p-4 font-bold text-center">수량</th>
                    <th className="p-4 font-bold text-right">단가 (원)</th>
                    <th className="p-4 font-bold text-right">합계 (원)</th>
                    <th className="p-4 font-bold text-center rounded-tr-xl w-12">삭제</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {items.map((item, idx) => (
                    <tr key={idx} className="hover:bg-slate-50/80 transition-colors">
                      <td className="p-4">
                        <div className="font-bold text-slate-800 text-base mb-1">
                          <input type="text" value={item.name} onChange={(e) => handleItemChange(idx, 'name', e.target.value)} className="bg-transparent w-full outline-none" />
                        </div>
                        <div className="text-xs text-slate-400">{item.spec || '-'} {item.unit ? `(${item.unit})` : ''}</div>
                      </td>
                      <td className="p-4 w-32">
                        <input type="number" value={item.qty} onChange={(e) => handleItemChange(idx, 'qty', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 w-40 text-right">
                        <input type="number" value={item.unitPrice} onChange={(e) => handleItemChange(idx, 'unitPrice', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-right font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 text-right font-bold text-blue-700 text-lg">
                        {formatCurrency(item.total)}
                      </td>
                      <td className="p-4 text-center">
                        <button onClick={() => handleRemoveItem(idx)} className="text-slate-300 hover:text-rose-500 p-1 transition-colors"><Trash size={18}/></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>

              <button onClick={handleAddItem} className="mt-4 flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-800 p-2 transition-colors">
                <Plus size={16}/> 품목 추가하기
              </button>
            </div>

            {/* Summary Footer */}
            <div className="bg-slate-900 p-6 md:p-8 text-white flex flex-col md:flex-row justify-end items-end md:items-center gap-6">
              <div className="text-right text-slate-400 text-sm font-medium">
                <p className="mb-1">공급가액: ₩ {formatCurrency(totalSupply)}</p>
                <p>부가세(10%): ₩ {formatCurrency(vat)}</p>
              </div>
              <div className="text-right">
                <p className="text-slate-400 text-sm font-bold mb-1">총 합계 (VAT 포함)</p>
                <p className="text-3xl md:text-4xl font-black text-emerald-400">₩ {formatCurrency(total)}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
