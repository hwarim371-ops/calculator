<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화림건설 범용 AI 견적 분석기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { background-color: #f1f5f9; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .loader-ring {
      display: inline-block; width: 50px; height: 50px;
      border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LabelList, Legend } from "https://esm.sh/recharts@2.12.3?deps=react@18.2.0,react-dom@18.2.0";
    import { UploadCloud, CheckCircle, ArrowLeft, Calculator, BarChart3, Edit3, Save, X, Plus, AlertTriangle, TrendingDown, Trash, Info, HardDrive, Camera, Download, FolderOpen, History, ExternalLink, RefreshCw } from "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0";

    // =========================================================================
    // ⚙️ 연동 설정
    // =========================================================================
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyRoXCApBmxxapCEjAQQB_8Vw0au8KgvKrNaxPVZZ4dUo-p71WcCtdsZDqZPcd71yQV/exec";
    const GEMINI_API_KEY  = "AIzaSyBSgqGZ9OOheYGri9LtZX2qHYjNI3aAzM0";   // ⚠️ 반드시 교체
    const GEMINI_MODEL    = "gemini-2.0-flash";
    // =========================================================================

    const formatCurrency = (num) => new Intl.NumberFormat('ko-KR').format(Math.round(num || 0));

    function App() {
      // 저장된 quotes 복원
      const [quotes, setQuotes] = useState(() => {
        try {
          const s = localStorage.getItem('hwarim_quotes');
          return s ? JSON.parse(s) : [];
        } catch { return []; }
      });

      const [view, setView] = useState(() => {
        try {
          const s = localStorage.getItem('hwarim_quotes');
          const q = s ? JSON.parse(s) : [];
          return q.length > 0 ? 'dashboard' : 'upload';
        } catch { return 'upload'; }
      });

      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analyzeProgress, setAnalyzeProgress] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState('');
      const [saveTitle, setSaveTitle] = useState('');
      const [isSaveModal, setIsSaveModal] = useState(false);
      const [selectedCompanyId, setSelectedCompanyId] = useState(null);
      const [driveErrorModal, setDriveErrorModal] = useState(false);
      const [isCapturing, setIsCapturing] = useState(false);

      // ✅ [v4] 저장 목록 관련 상태
      const [savedList, setSavedList] = useState([]);
      const [isLoadingList, setIsLoadingList] = useState(false);
      const [loadedFolderName, setLoadedFolderName] = useState(''); // 현재 대시보드가 불러온 저장분인지

      const fileInputRef = useRef(null);
      const reportRef = useRef(null);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 5000); };

      // quotes 변경 시 localStorage 자동 저장 (base64 제외)
      useEffect(() => {
        const slim = quotes.map(({ originalFile, ...rest }) => rest);
        try { localStorage.setItem('hwarim_quotes', JSON.stringify(slim)); } catch (e) {}
      }, [quotes]);

      // ✅ [v4] 업로드 화면 진입 시 저장 목록 자동 로드 (silent)
      useEffect(() => {
        if (view === 'upload') {
          loadSavedList(true);
        }
      }, [view]);

      // 리포트 전체 PNG 캡처 + 저장 + 클립보드 복사
      const captureReport = async () => {
        if (!reportRef.current) return showToast("❌ 캡처할 영역을 찾지 못했습니다.");
        if (!window.html2canvas) return showToast("❌ 캡처 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.");
        setIsCapturing(true);
        showToast("📸 전체 리포트 캡처 중...");
        try {
          const canvas = await window.html2canvas(reportRef.current, {
            scale: 2,
            backgroundColor: '#f1f5f9',
            useCORS: true,
            allowTaint: true,
            scrollX: 0,
            scrollY: 0,
            width: reportRef.current.scrollWidth,
            height: reportRef.current.scrollHeight,
            windowWidth: reportRef.current.scrollWidth
          });

          const dateStr = new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g, '-').replace(/-$/, '');
          const link = document.createElement('a');
          link.download = `화림건설_견적비교_${dateStr}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();

          try {
            canvas.toBlob(async (blob) => {
              await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
              showToast("✅ PNG 저장 완료 + 클립보드 복사 완료!");
            });
          } catch {
            showToast("✅ PNG 이미지가 저장되었습니다!");
          }
        } catch (err) {
          console.error("캡처 오류:", err);
          showToast("❌ 캡처 실패. 잠시 후 다시 시도해주세요.");
        } finally {
          setIsCapturing(false);
        }
      };

      // ====================================================================
      // AI 분석 (Gemini)
      // ====================================================================
      const analyzeSingleFile = (file) => {
        return new Promise((resolve, reject) => {
          let mimeType = file.type;
          const fileName = file.name.toLowerCase();

          if (!mimeType) {
            if (fileName.endsWith('.pdf')) mimeType = 'application/pdf';
            else if (fileName.endsWith('.png')) mimeType = 'image/png';
            else if (fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) mimeType = 'image/jpeg';
            else if (fileName.endsWith('.webp')) mimeType = 'image/webp';
            else mimeType = 'application/octet-stream';
          }

          const reader = new FileReader();
          reader.onerror = () => resolve({
            name: file.name.replace(/\.[^/.]+$/, '') || "알 수 없는 업체",
            totalSupply: 0, vat: 0, total: 0,
            summary: "파일을 읽을 수 없습니다.",
            items: []
          });

          reader.onload = async () => {
            const base64Data = reader.result.split(',')[1];

            const originalFileContext = {
              name: file.name,
              type: mimeType,
              base64: base64Data
            };

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{
                      parts: [
                        { text: `당신은 건설/자재 분야의 전문 견적 분석가입니다. 첨부된 견적서(PDF/이미지)를 정밀 분석하여 아래 필드를 추출하세요.

【필수 추출 항목】
1. name: 견적을 제출한 "업체명"만 정확히 (예: "한일티앤에이치", "청계산업"). 파일명·수신자가 아닌 발행 업체명.
2. items: 품목별 배열. 각 품목은 반드시 다음 7개 필드를 모두 가질 것:
   - id: 일련번호(1,2,3...)
   - name: 품명 (원문 그대로)
   - spec: 규격/사이즈 (예: "6900*3200", "0.4mm")
   - unit: 단위 (예: "개","식","장","세트","m²","kg")
   - qty: 수량 (숫자만)
   - unitPrice: 단가 (콤마/원 표시 제외, 숫자만)
   - total: 품목 소계 = qty × unitPrice
3. totalSupply: 공급가액 (VAT 제외 소계)
4. vat: 부가세 (공급가액의 10%)
5. total: 총 합계 (VAT 포함)
6. summary: 견적서 특이사항 1~2줄. 납기/결제조건/할인/배송비/방염·방수 처리 여부/유효기간/비고 내용 등을 간결히.

【엄수 사항】
- 견적서에 적힌 모든 품목을 빠짐없이 추출 (합계/소계 행은 items에 넣지 말 것)
- 수량/단가가 명시되지 않으면 0으로 (1로 가정 금지)
- 숫자 필드는 반드시 숫자 타입, 콤마·원·₩ 제거
- 업체명을 못 읽으면 빈 문자열로 (추측 금지)
- 응답은 마크다운 없이 **순수 JSON만** 반환` },
                        { inlineData: { mimeType: mimeType, data: base64Data } }
                      ]
                    }],
                    generationConfig: {
                      responseMimeType: "application/json",
                      responseSchema: {
                        type: "OBJECT",
                        properties: {
                          name: { type: "STRING" },
                          totalSupply: { type: "NUMBER" },
                          vat: { type: "NUMBER" },
                          total: { type: "NUMBER" },
                          summary: { type: "STRING" },
                          items: {
                            type: "ARRAY",
                            items: {
                              type: "OBJECT",
                              properties: {
                                id: { type: "NUMBER" },
                                name: { type: "STRING" },
                                spec: { type: "STRING" },
                                unit: { type: "STRING" },
                                qty: { type: "NUMBER" },
                                unitPrice: { type: "NUMBER" },
                                total: { type: "NUMBER" }
                              }
                            }
                          }
                        },
                        required: ["name", "totalSupply", "vat", "total", "summary", "items"]
                      }
                    }
                  })
                }
              );

              if (!response.ok) {
                const errText = await response.text().catch(() => '');
                console.error(`[Gemini API Error ${response.status}]`, errText);
                throw new Error(`API_FAIL_${response.status}`);
              }
              const result = await response.json();

              if (!result.candidates || result.candidates.length === 0) throw new Error("EMPTY_CANDIDATES");
              let jsonText = result.candidates[0]?.content?.parts[0]?.text;
              if (!jsonText) throw new Error("EMPTY_RESPONSE");
              jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();
              const parsedData = JSON.parse(jsonText);

              if (!parsedData.name || parsedData.name.trim() === '' || parsedData.name === '알 수 없음') {
                parsedData.name = file.name.replace(/\.[^/.]+$/, '');
              }
              if (parsedData.total === 0 && parsedData.totalSupply > 0) {
                parsedData.vat = Math.round(parsedData.totalSupply * 0.1);
                parsedData.total = parsedData.totalSupply + parsedData.vat;
              }

              // items 소계 재계산 (AI가 놓친 경우 방어)
              if (Array.isArray(parsedData.items)) {
                parsedData.items = parsedData.items.map((it, idx) => ({
                  id: it.id || idx + 1,
                  name: it.name || '',
                  spec: it.spec || '',
                  unit: it.unit || '',
                  qty: Number(it.qty) || 0,
                  unitPrice: Number(it.unitPrice) || 0,
                  total: (it.total && it.total > 0) ? Number(it.total) : (Number(it.qty) || 0) * (Number(it.unitPrice) || 0)
                }));
              }

              resolve({ ...parsedData, originalFile: originalFileContext });

            } catch (err) {
              console.error("[AI 분석 실패]", file.name, err);
              resolve({
                name: file.name.replace(/\.[^/.]+$/, '') || "분석 실패",
                totalSupply: 0, vat: 0, total: 0,
                summary: `⚠️ AI 분석 실패 (${err.message}). API 키를 확인하거나 계산기에서 직접 입력하세요.`,
                items: [],
                originalFile: originalFileContext,
                _analysisError: true
              });
            }
          };
          reader.readAsDataURL(file);
        });
      };

      const processFiles = async (fileList) => {
        const filesArray = Array.from(fileList);
        if (filesArray.length === 0) return;

        setIsAnalyzing(true);
        const newQuotes = [];
        let successCount = 0;
        let failCount = 0;

        for (let i = 0; i < filesArray.length; i++) {
          const file = filesArray[i];
          setAnalyzeProgress(`[${i + 1} / ${filesArray.length}] ${file.name} 분석 중...`);
          try {
            const parsedData = await analyzeSingleFile(file);
            let finalName = parsedData.name;
            const existingNames = [...quotes, ...newQuotes].map(q => q.name);
            if (existingNames.includes(finalName)) {
              let cnt = 2;
              while (existingNames.includes(`${finalName} (${cnt})`)) cnt++;
              finalName = `${finalName} (${cnt})`;
            }
            const newQuote = { id: Date.now().toString() + i, ...parsedData, name: finalName };
            newQuotes.push(newQuote);
            if (parsedData._analysisError) failCount++;
            else successCount++;
          } catch (e) {
            showToast(`'${file.name}' 분석 중 오류가 발생했습니다.`);
            failCount++;
          }
        }

        if (newQuotes.length > 0) {
          setQuotes(prev => [...prev, ...newQuotes]);
          setView('dashboard');
          if (failCount > 0) {
            showToast(`✅ ${successCount}개 분석 완료 / ⚠️ ${failCount}개 실패 (계산기에서 수동 입력 가능)`);
          } else {
            showToast(`✅ 총 ${successCount}개의 견적서가 분석 및 추가되었습니다!`);
          }
        }

        setIsAnalyzing(false);
        setAnalyzeProgress('');
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const handleFileChange = (e) => {
        if (e.target.files && e.target.files.length > 0) {
          processFiles(e.target.files);
          e.target.value = '';
        }
      };

      const onDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); };
      const onDrop = (e) => {
        e.preventDefault(); e.stopPropagation(); setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) processFiles(e.dataTransfer.files);
      };

      // ====================================================================
      // 드라이브 저장 (원본 + 분석결과)
      // ====================================================================
      const handleSave = async () => {
        if (!saveTitle.trim()) return showToast("저장할 프로젝트(폴더) 이름을 입력해주세요.");
        const filesToUpload = quotes.map(q => q.originalFile).filter(Boolean);
        const hasAnalysis = quotes.length > 0;

        if (filesToUpload.length === 0 && !hasAnalysis) {
          return showToast("⚠️ 저장할 내용이 없습니다.");
        }

        setIsLoading(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              action: "saveFiles",
              title: saveTitle,
              files: filesToUpload,
              analysisData: quotes.map(({ originalFile, ...rest }) => rest)
            })
          });

          let result;
          try {
            result = await response.json();
          } catch (jsonErr) {
            setDriveErrorModal(true);
            setIsSaveModal(false);
            return;
          }

          if (result && result.success) {
            setIsSaveModal(false);
            setSaveTitle('');
            const msg = filesToUpload.length > 0
              ? `✅ 원본 ${filesToUpload.length}개 + 분석결과 저장 완료!`
              : `✅ 분석결과 저장 완료! (원본 파일은 새로고침 후 유실된 상태)`;
            showToast(msg);
            // 저장 직후 목록 갱신
            loadSavedList(true);
          } else {
            setDriveErrorModal(true);
            setIsSaveModal(false);
          }
        } catch (e) {
          setDriveErrorModal(true);
          setIsSaveModal(false);
        } finally {
          setIsLoading(false);
        }
      };

      const handleUpdateQuote = (updatedQuote) => {
        setQuotes(prev => prev.map(q => q.id === updatedQuote.id ? updatedQuote : q));
        setView('dashboard');
        showToast(`${updatedQuote.name}의 상세 내역이 갱신되었습니다.`);
      };

      const handleDeleteQuote = (id) => {
        const newQuotes = quotes.filter(q => q.id !== id);
        setQuotes(newQuotes);
        showToast("비교 대상에서 제외되었습니다.");
        if (newQuotes.length === 0) {
          localStorage.removeItem('hwarim_quotes');
          setLoadedFolderName('');
          setView('upload');
        }
      };

      // ====================================================================
      // ✅ [v4] 저장 목록 관리
      // ====================================================================
      // silent=true면 view 이동 없이 목록만 갱신
      const loadSavedList = async (silent = false) => {
        if (!silent) setIsLoadingList(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "listSaves" })
          });
          const result = await response.json();
          if (result && result.success) {
            setSavedList(result.items || []);
            if (!silent) setView('history');
          } else if (!silent) {
            setDriveErrorModal(true);
          }
        } catch (e) {
          if (!silent) setDriveErrorModal(true);
        } finally {
          if (!silent) setIsLoadingList(false);
        }
      };

      // 특정 저장분 불러와서 대시보드로 복원
      const loadSavedProject = async (folderId, folderName) => {
        setIsLoading(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "loadSave", folderId })
          });
          const result = await response.json();
          if (result && result.success && Array.isArray(result.analysisData)) {
            const restored = result.analysisData.map((q, i) => ({
              ...q,
              id: q.id || (Date.now().toString() + i)
            }));
            setQuotes(restored);
            setLoadedFolderName(result.folderName || folderName || '');
            setView('dashboard');
            showToast(`✅ "${result.folderName}" 불러오기 완료 (${restored.length}개 견적)`);
          } else {
            showToast(`❌ 불러오기 실패: ${result.error || "알 수 없는 오류"}`);
          }
        } catch (e) {
          showToast("❌ 서버 통신 오류");
        } finally {
          setIsLoading(false);
        }
      };

      // 저장분 삭제 (휴지통 이동)
      const deleteSavedProject = async (folderId, folderName) => {
        if (!confirm(`"${folderName}"\n\n정말 이 저장분을 삭제하시겠어요?\n(구글 드라이브 휴지통으로 이동됩니다)`)) return;
        setIsLoadingList(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "deleteSave", folderId })
          });
          const result = await response.json();
          if (result && result.success) {
            setSavedList(prev => prev.filter(item => item.id !== folderId));
            showToast(`✅ ${result.message}`);
          } else {
            showToast(`❌ 삭제 실패: ${result.error || "알 수 없는 오류"}`);
          }
        } catch (e) {
          showToast("❌ 서버 통신 오류");
        } finally {
          setIsLoadingList(false);
        }
      };

      // ==========================================
      // VIEW 1: 업로드 (메인 화면)
      // ==========================================
      if (view === 'upload') {
        return (
          <div className="min-h-screen flex flex-col items-center py-10 px-4 md:px-12 animate-fade-in text-slate-800">
            <div className="w-full max-w-6xl mb-12 text-center">
              <div className="inline-flex items-center justify-center p-4 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-600/20 mb-6">
                <Calculator size={36} strokeWidth={2.5} />
              </div>
              <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900">
                범용 AI 견적 분석기
              </h1>
              <p className="text-lg text-slate-500 font-medium">

                  <p className="text-sm text-slate-500 mb-2 font-medium">분석 원본 파일과 AI 분석결과가 <b>구글 드라이브 → 화림건설 견적분석기</b> 카테고리 폴더에 저장됩니다.</p>
                  <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 mb-6 text-xs text-blue-700 font-medium">
                    📁 저장 위치: <b>내 드라이브 → 화림건설 견적분석기 → [견적원본] 폴더명</b>
                  </div>
                  <label className="block text-sm font-bold text-slate-700 mb-2">생성할 폴더 이름</label>
                  <input
                    type="text" value={saveTitle} onChange={e => setSaveTitle(e.target.value)}
                    placeholder="예: 2026년 OO현장 자재 단가 비교"
                    className="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl mb-8 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 font-medium text-slate-800 transition-all"
                    autoFocus
                    onKeyDown={e => { if (e.key === 'Enter') handleSave(); }}
                  />
                  <div className="flex gap-3">
                    <button onClick={() => setIsSaveModal(false)} className="flex-1 py-3.5 bg-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors">취소</button>
                    <button onClick={handleSave} disabled={isLoading} className="flex-1 py-3.5 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 transition-colors disabled:opacity-60">
                      {isLoading ? "업로드 중..." : "드라이브에 저장"}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 에러 모달 */}
            {driveErrorModal && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-slate-200">
                  <div className="p-6 bg-rose-50 border-b border-rose-100 flex items-center gap-3">
                    <AlertTriangle className="text-rose-600" size={32} />
                    <h3 className="text-2xl font-extrabold text-rose-800 tracking-tight">구글 드라이브 업로드 오류</h3>
                  </div>
                  <div className="p-8 text-slate-700 space-y-4 font-medium">
                    <p className="text-lg">현재 연결된 구글 앱스크립트가 올바르게 세팅되지 않았거나 권한이 없습니다.</p>
                    <div className="bg-slate-100 p-5 rounded-2xl space-y-3 mt-4 text-base">
                      <p className="font-bold text-blue-700 text-lg mb-2">💡 완벽 해결 가이드</p>
                      <p>1. 구글 앱스크립트 에디터에서 <b>Code.gs</b>가 v3 최신 코드로 업데이트되었는지 확인하세요.</p>
                      <p>2. 에디터 우측 상단의 파란색 <b>[배포] → [새 배포]</b>를 반드시 클릭합니다.</p>
                      <p>3. 권한 승인 창이 뜨면 <b>[고급] → [(안전하지 않음)으로 이동] → [허용]</b>을 눌러 드라이브 파일 생성 권한을 허용합니다.</p>
                      <p>4. <b>새로 발급받은 웹 앱 URL</b>을 <code className="bg-white px-2 py-1 rounded text-rose-500 font-bold">GAS_WEB_APP_URL</code>에 업데이트 해주세요.</p>
                    </div>
                  </div>
                  <div className="p-5 bg-slate-50 border-t border-slate-200 flex justify-end">
                    <button onClick={() => setDriveErrorModal(false)} className="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors shadow-md">내용을 확인했습니다</button>
                  </div>
                </div>
              </div>
            )}

            {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-xl shadow-2xl z-[100] font-bold animate-fade-in flex items-center gap-2"><CheckCircle size={18} className="text-emerald-400"/> {toast}</div>}
          </div>
        );
      }

      // ==========================================
      // ✅ [v4] VIEW: 저장 목록 (History) - 전체화면
      // ==========================================
      if (view === 'history') {
        return (
          <div className="min-h-screen bg-slate-50 p-4 md:p-8 animate-fade-in font-sans text-slate-800">
            <div className="max-w-5xl mx-auto space-y-6">

              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center gap-4">
                  <button
                    onClick={() => setView(quotes.length > 0 ? 'dashboard' : 'upload')}
                    className="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors text-slate-600"
                    title="뒤로가기"
                  >
                    <ArrowLeft size={20} />
                  </button>
                  <div>
                    <h1 className="text-2xl font-bold flex items-center gap-2">
                      <History className="text-blue-600" /> 저장된 분석 목록
                    </h1>
                    <p className="text-sm text-slate-500 font-medium mt-1">
                      총 <b className="text-blue-600">{savedList.length}</b>개의 저장분이 구글 드라이브에 있습니다.
                    </p>
                  </div>
                </div>
                <button
                  onClick={() => loadSavedList(false)}
                  disabled={isLoadingList}
                  className="flex items-center gap-2 px-4 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors disabled:opacity-60"
                  title="목록 새로고침"
                >
                  <RefreshCw size={16} className={isLoadingList ? "animate-spin" : ""}/> 새로고침
                </button>
              </div>

              {isLoadingList ? (
                <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center">
                  <div className="loader-ring mx-auto mb-4"></div>
                  <p className="text-slate-500 font-medium">구글 드라이브에서 불러오는 중...</p>
                </div>
              ) : savedList.length === 0 ? (
                <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center">
                  <FolderOpen size={48} className="mx-auto text-slate-300 mb-4"/>
                  <p className="text-lg font-bold text-slate-600 mb-1">아직 저장된 분석이 없습니다</p>
                  <p className="text-sm text-slate-400">견적서를 분석한 후 "드라이브 저장"을 눌러보세요.</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {savedList.map(item => (
                    <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 hover:shadow-md hover:border-blue-300 transition-all">
                      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="flex-1 min-w-0">
                          <h3 className="text-lg font-bold text-slate-900 mb-2 break-all">{item.name}</h3>
                          <div className="flex flex-wrap gap-x-4 gap-y-1 text-sm text-slate-500 font-medium">
                            <span>📅 {new Date(item.createdAt).toLocaleString('ko-KR', {dateStyle:'medium', timeStyle:'short'})}</span>
                            <span>📄 원본 {item.fileCount}개</span>
                            <span>📊 견적 {item.quoteCount}개</span>
                            {item.lowestName && item.lowestTotal !== null && (
                              <span className="text-emerald-600 font-bold">
                                💰 최저가: {item.lowestName} (₩{formatCurrency(item.lowestTotal)})
                              </span>
                            )}
                          </div>
                          {!item.hasAnalysis && (
                            <p className="text-xs text-amber-600 mt-2 font-medium">⚠️ AI 분석결과 JSON이 없는 폴더입니다. (원본 파일만 있음)</p>
                          )}
                        </div>
                        <div className="flex gap-2 flex-shrink-0 flex-wrap">
                          <button
                            onClick={() => loadSavedProject(item.id, item.name)}
                            disabled={!item.hasAnalysis || isLoading}
                            className="flex items-center gap-1.5 px-4 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-sm disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap"
                            title={item.hasAnalysis ? "이 분석 불러오기" : "분석결과 없음"}
                          >
                            <FolderOpen size={16}/> 불러오기
                          </button>
                          <a
                            href={item.url}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="flex items-center gap-1.5 px-4 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors whitespace-nowrap"
                            title="구글 드라이브에서 열기"
                          >
                            <ExternalLink size={16}/> 드라이브
                          </a>
                          <button
                            onClick={() => deleteSavedProject(item.id, item.name)}
                            className="p-2.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-colors"
                            title="저장분 삭제 (휴지통)"
                          >
                            <Trash size={18}/>
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

            </div>

            {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-xl shadow-2xl z-[100] font-bold animate-fade-in flex items-center gap-2"><CheckCircle size={18} className="text-emerald-400"/> {toast}</div>}

            {driveErrorModal && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-slate-200">
                  <div className="p-6 bg-rose-50 border-b border-rose-100 flex items-center gap-3">
                    <AlertTriangle className="text-rose-600" size={32} />
                    <h3 className="text-2xl font-extrabold text-rose-800 tracking-tight">구글 드라이브 통신 오류</h3>
                  </div>
                  <div className="p-8 text-slate-700 space-y-4 font-medium">
                    <p className="text-lg">앱스크립트가 v3 최신 버전으로 재배포되지 않았을 수 있습니다.</p>
                    <div className="bg-slate-100 p-5 rounded-2xl space-y-2 text-sm">
                      <p className="font-bold text-blue-700 mb-2">💡 해결 순서</p>
                      <p>1. Code.gs에 v3 코드 반영</p>
                      <p>2. [배포] → [새 배포] → 웹 앱으로 배포</p>
                      <p>3. 새로 발급된 URL을 <code className="bg-white px-1.5 rounded text-rose-500 font-bold">GAS_WEB_APP_URL</code>에 업데이트</p>
                    </div>
                  </div>
                  <div className="p-5 bg-slate-50 border-t border-slate-200 flex justify-end">
                    <button onClick={() => setDriveErrorModal(false)} className="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors shadow-md">확인</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ==========================================
      // VIEW 3: 상세 내역 수정 (계산기)
      // ==========================================
      if (view === 'calculator') {
        const company = quotes.find(q => q.id === selectedCompanyId);
        if (!company) { setView('dashboard'); return null; }
        return <CalculatorView company={company} onBack={() => setView('dashboard')} onSave={handleUpdateQuote} />;
      }
    }

    // --- Sub-component: Calculator ---
    function CalculatorView({ company, onBack, onSave }) {
      const [items, setItems] = useState([...(company.items || [])]);

      const handleItemChange = (idx, field, value) => {
        setItems(prev => {
          const newItems = [...prev];
          if (field === 'name' || field === 'spec' || field === 'unit') {
            newItems[idx] = { ...newItems[idx], [field]: value };
          } else {
            const val = Number(value) || 0;
            newItems[idx] = { ...newItems[idx], [field]: val };
            if (field === 'qty' || field === 'unitPrice') {
              newItems[idx].total = newItems[idx].qty * newItems[idx].unitPrice;
            }
          }
          return newItems;
        });
      };

      const handleAddItem = () => {
        setItems([...items, { id: Date.now(), name: "추가 품목", spec: "", unit: "식", qty: 1, unitPrice: 0, total: 0 }]);
      };

      const handleRemoveItem = (idx) => {
        setItems(prev => prev.filter((_, i) => i !== idx));
      };

      const totalSupply = items.reduce((sum, item) => sum + (item.total || 0), 0);
      const vat = Math.round(totalSupply * 0.1);
      const total = totalSupply + vat;

      const handleSaveClick = () => {
        onSave({ ...company, items, totalSupply, vat, total });
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

            {/* Header */}
            <div className="p-6 md:p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50">
              <div className="flex items-center gap-4 w-full md:w-auto">
                <button onClick={onBack} className="p-2 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                <div>
                  <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2"><Edit3 className="text-blue-600"/> {company.name} 상세 내역</h2>
                  <p className="text-sm text-slate-500 font-medium mt-1">AI가 추출한 항목입니다. 수량 및 단가를 수정하여 재계산할 수 있습니다.</p>
                </div>
              </div>
              <button onClick={handleSaveClick} className="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition-colors">
                <CheckCircle size={18}/> 수정 완료
              </button>
            </div>

            {/* Table */}
            <div className="p-6 md:p-8 overflow-x-auto">
              <table className="w-full text-left border-collapse min-w-[700px]">
                <thead>
                  <tr className="bg-slate-100 text-slate-600 text-sm">
                    <th className="p-4 font-bold rounded-tl-xl">품명 및 규격</th>
                    <th className="p-4 font-bold text-center">수량</th>
                    <th className="p-4 font-bold text-right">단가 (원)</th>
                    <th className="p-4 font-bold text-right">합계 (원)</th>
                    <th className="p-4 font-bold text-center rounded-tr-xl w-12">삭제</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {items.map((item, idx) => (
                    <tr key={idx} className="hover:bg-slate-50/80 transition-colors">
                      <td className="p-4">
                        <div className="font-bold text-slate-800 text-base mb-1">
                          <input type="text" value={item.name} onChange={(e) => handleItemChange(idx, 'name', e.target.value)} className="bg-transparent w-full outline-none" />
                        </div>
                        <div className="text-xs text-slate-400 flex gap-2">
                          <input type="text" value={item.spec || ''} placeholder="규격" onChange={(e) => handleItemChange(idx, 'spec', e.target.value)} className="bg-transparent outline-none flex-1"/>
                          <input type="text" value={item.unit || ''} placeholder="단위" onChange={(e) => handleItemChange(idx, 'unit', e.target.value)} className="bg-transparent outline-none w-16"/>
                        </div>
                      </td>
                      <td className="p-4 w-32">
                        <input type="number" value={item.qty} onChange={(e) => handleItemChange(idx, 'qty', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 w-40 text-right">
                        <input type="number" value={item.unitPrice} onChange={(e) => handleItemChange(idx, 'unitPrice', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-right font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 text-right font-bold text-blue-700 text-lg">
                        {formatCurrency(item.total)}
                      </td>
                      <td className="p-4 text-center">
                        <button onClick={() => handleRemoveItem(idx)} className="text-slate-300 hover:text-rose-500 p-1 transition-colors"><Trash size={18}/></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>

              <button onClick={handleAddItem} className="mt-4 flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-800 p-2 transition-colors">
                <Plus size={16}/> 품목 추가하기
              </button>
            </div>

            {/* Summary Footer */}
            <div className="bg-slate-900 p-6 md:p-8 text-white flex flex-col md:flex-row justify-end items-end md:items-center gap-6">
              <div className="text-right text-slate-400 text-sm font-medium">
                <p className="mb-1">공급가액: ₩ {formatCurrency(totalSupply)}</p>
                <p>부가세(10%): ₩ {formatCurrency(vat)}</p>
              </div>
              <div className="text-right">
                <p className="text-slate-400 text-sm font-bold mb-1">총 합계 (VAT 포함)</p>
                <p className="text-3xl md:text-4xl font-black text-emerald-400">₩ {formatCurrency(total)}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
