<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화림건설 범용 AI 견적 분석기</title>
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
  <style>
    @import url('[https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css](https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css)');
    body { background-color: #f1f5f9; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .loader-ring {
      display: inline-block; width: 50px; height: 50px;
      border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from "[https://esm.sh/react@18.2.0](https://esm.sh/react@18.2.0)";
    import { createRoot } from "[https://esm.sh/react-dom@18.2.0/client](https://esm.sh/react-dom@18.2.0/client)";
    import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LabelList, Legend } from "[https://esm.sh/recharts@2.12.3?deps=react@18.2.0,react-dom@18.2.0](https://esm.sh/recharts@2.12.3?deps=react@18.2.0,react-dom@18.2.0)";
    import { UploadCloud, CheckCircle, ArrowLeft, Calculator, BarChart3, Edit3, Save, FolderOpen, Clock, X, FileText, Plus, AlertTriangle, TrendingDown } from "[https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0](https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0)";

    // =========================================================================
    // ⚙️ 필수 연동 설정
    // =========================================================================
    // 1. 구글 스크립트 배포 URL
    const GAS_WEB_APP_URL = "[https://script.google.com/macros/s/AKfycby2WMcrrjfioYaKIDohM4ccSFA_Ez3cMU-DtDt-ZvT4DclWtd4FFIwLGLj1DHXaytoaew/exec](https://script.google.com/macros/s/AKfycby2WMcrrjfioYaKIDohM4ccSFA_Ez3cMU-DtDt-ZvT4DclWtd4FFIwLGLj1DHXaytoaew/exec)";
    
    // 2. 구글 제미나이 AI API 키
    const GEMINI_API_KEY = "AQ.Ab8RN6JVV1VDDAcAUqgnurb21txb-uloDM_JurvnDMbSXwYUWQ";
    // =========================================================================

    const formatCurrency = (num) => new Intl.NumberFormat('ko-KR').format(Math.round(num || 0));

    function App() {
      const [view, setView] = useState('upload'); 
      const [history, setHistory] = useState([]);
      const [quotes, setQuotes] = useState([]); 
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [isDragging, setIsDragging] = useState(false); 
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState('');
      const [saveTitle, setSaveTitle] = useState('');
      const [isSaveModal, setIsSaveModal] = useState(false);
      const [selectedCompanyId, setSelectedCompanyId] = useState(null);
      
      const fileInputRef = useRef(null);

      // 페이지 로드 시 구글 시트의 내역 가져오기
      useEffect(() => { loadHistory(); }, []);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 4000); };

      const loadHistory = async () => {
        try {
          const res = await fetch(GAS_WEB_APP_URL);
          const data = await res.json();
          setHistory(Array.isArray(data) ? data : []);
        } catch (e) { console.error("데이터 로드 실패:", e); }
      };

      // --- [AI 제미나이 분석 엔진 (파일 객체 처리)] ---
      const processFile = async (file) => {
        if (!file) return;

        // 허용된 파일 타입 검증 (Gemini는 이미지와 PDF만 지원)
        const validTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/webp', 'image/heic'];
        if (!validTypes.includes(file.type)) {
          showToast("지원하지 않는 파일입니다. (PDF 또는 JPG, PNG 이미지 파일만 가능)");
          if (fileInputRef.current) fileInputRef.current.value = '';
          return;
        }

        setIsAnalyzing(true);
        const reader = new FileReader();
        
        reader.onerror = () => {
          showToast("파일을 읽는 중 오류가 발생했습니다.");
          setIsAnalyzing(false);
        };

        reader.onload = async () => {
          const base64Data = reader.result.split(',')[1];
          try {
            // 프론트엔드에서 안정적인 gemini-1.5-flash 모델 호출
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  parts: [
                    { text: "당신은 전문 견적 분석가입니다. 첨부된 견적서(이미지/PDF)를 분석하여 정보를 추출하세요. 항목이 없거나 알 수 없으면 0 또는 빈문자열로 기재하세요. 결과는 반드시 JSON 스키마를 엄격히 준수하여 순수 JSON 포맷으로만 응답해야 합니다. 마크다운 기호를 사용하지 마세요." },
                    { inlineData: { mimeType: file.type, data: base64Data } }
                  ]
                }],
                generationConfig: {
                  responseMimeType: "application/json",
                  responseSchema: {
                    type: "OBJECT",
                    properties: {
                      name: { type: "STRING", description: "업체명 또는 발신처" },
                      totalSupply: { type: "NUMBER", description: "공급가액 총액 (숫자)" },
                      vat: { type: "NUMBER", description: "부가세 (숫자)" },
                      total: { type: "NUMBER", description: "총 견적 합계 금액 (숫자)" },
                      items: {
                        type: "ARRAY",
                        items: {
                          type: "OBJECT",
                          properties: {
                            id: { type: "NUMBER" },
                            name: { type: "STRING", description: "품명/공사명" },
                            spec: { type: "STRING", description: "규격/사이즈 (없으면 빈문자열)" },
                            unit: { type: "STRING", description: "단위 (식, 개 등)" },
                            qty: { type: "NUMBER", description: "수량 (숫자)" },
                            unitPrice: { type: "NUMBER", description: "단가 (숫자)" },
                            total: { type: "NUMBER", description: "해당 품목의 합계 금액 (숫자)" }
                          }
                        }
                      }
                    },
                    required: ["name", "totalSupply", "vat", "total", "items"]
                  }
                }
              })
            });

            // 에러 처리 강화
            if (!response.ok) {
              const errorData = await response.json();
              const errMsg = errorData.error?.message || "알 수 없는 에러";
              if (errMsg.includes("API key not valid")) {
                throw new Error("유효하지 않은 API 키입니다. 제미나이 API 키를 다시 확인해주세요.");
              }
              throw new Error(`API 오류: ${errMsg}`);
            }
            
            const result = await response.json();
            let jsonText = result.candidates[0]?.content?.parts[0]?.text;
            
            if (!jsonText) throw new Error("AI가 응답을 생성하지 못했습니다.");

            // 마크다운 백틱 제거 (파싱 에러 방지)
            jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();
            const parsedData = JSON.parse(jsonText);
            
            // 고유 ID 부여하여 견적 리스트에 추가
            const newQuote = { id: Date.now().toString(), ...parsedData };
            
            setQuotes(prev => [...prev, newQuote]);
            setView('dashboard');
            showToast(`[${parsedData.name || '알 수 없는 업체'}] 견적서가 분석 및 추가되었습니다!`);
            
          } catch (err) {
            console.error("AI Error:", err);
            showToast(`분석 실패: ${err.message}`);
          } finally {
            setIsAnalyzing(false);
            if (fileInputRef.current) fileInputRef.current.value = '';
          }
        };
        reader.readAsDataURL(file);
      };

      // 입력 버튼 업로드 
      const handleFileChange = (e) => {
        if(e.target.files && e.target.files[0]) {
          processFile(e.target.files[0]);
        }
      };

      // 드래그 앤 드롭 업로드 이벤트 (이벤트 버블링 방지 및 확실한 처리)
      const onDragOver = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(true);
      };

      const onDragLeave = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
      };

      const onDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          processFile(e.dataTransfer.files[0]);
        }
      };

      // --- [구글 시트에 저장] ---
      const handleSave = async () => {
        if (!saveTitle.trim()) return showToast("저장할 프로젝트 제목을 입력해주세요.");
        if (quotes.length === 0) return showToast("저장할 견적 데이터가 없습니다.");
        
        setIsLoading(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ 
              action: "save",
              title: saveTitle, 
              quotesJson: JSON.stringify(quotes) 
            })
          });
          const result = await response.json();
          if (result.success) {
            setIsSaveModal(false); 
            setSaveTitle('');
            showToast("구글 드라이브(시트)에 안전하게 저장되었습니다."); 
            loadHistory();
          } else {
            throw new Error("Save failed");
          }
        } catch (e) {
          showToast("저장 실패. 구글 앱스크립트 권한을 확인하세요.");
        } finally {
          setIsLoading(false);
        }
      };

      const handleUpdateQuote = (updatedQuote) => {
        setQuotes(prev => prev.map(q => q.id === updatedQuote.id ? updatedQuote : q));
        setView('dashboard');
        showToast(`${updatedQuote.name}의 상세 내역이 갱신되었습니다.`);
      };

      const handleDeleteQuote = (id) => {
        setQuotes(prev => prev.filter(q => q.id !== id));
        showToast("비교 대상에서 제외되었습니다.");
        if (quotes.length <= 1) setView('upload');
      };

      // ==========================================
      // VIEW 1: 업로드 & 보관함 (메인 화면)
      // ==========================================
      if (view === 'upload') {
        return (
          <div className="min-h-screen flex flex-col items-center py-10 px-4 md:px-12 animate-fade-in text-slate-800">
            {/* Header & Hero */}
            <div className="w-full max-w-6xl mb-12 text-center">
              <div className="inline-flex items-center justify-center p-4 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-600/20 mb-6">
                <Calculator size={36} strokeWidth={2.5} />
              </div>
              <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900">
                범용 AI 견적 분석기
              </h1>
              <p className="text-lg text-slate-500 font-medium">
                업종 상관없이 모든 견적서를 AI가 즉시 분석하고, 구글 클라우드에 저장합니다.
              </p>
            </div>

            {/* Upload Section (드래그 앤 드롭 완벽 지원) */}
            <div className="w-full max-w-4xl glass-effect bg-white/80 rounded-[2rem] shadow-2xl p-8 md:p-14 mb-12 border border-white">
              <div 
                className={`group relative flex flex-col items-center justify-center w-full h-80 border-2 border-dashed rounded-3xl transition-all cursor-pointer overflow-hidden ${isDragging ? 'border-blue-500 bg-blue-100 scale-[1.02]' : 'border-blue-200 bg-blue-50/30 hover:bg-blue-50/80 hover:border-blue-400'}`}
                onDragOver={onDragOver}
                onDragLeave={onDragLeave}
                onDrop={onDrop}
                onClick={() => { if(!isAnalyzing) fileInputRef.current?.click(); }}
              >
                <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileChange} accept=".pdf,image/jpeg,image/png,image/webp,image/heic" disabled={isAnalyzing} />
                
                {isAnalyzing ? (
                  <div className="flex flex-col items-center z-10">
                    <div className="loader-ring mb-6"></div>
                    <p className="text-2xl font-bold text-blue-700 mb-2">AI 제미나이가 문서 구조를 분석 중입니다</p>
                    <p className="text-slate-500">항목 추출 및 금액 검증을 진행하고 있습니다...</p>
                  </div>
                ) : (
                  <div className="flex flex-col items-center z-10 transition-transform group-hover:-translate-y-2 pointer-events-none">
                    <div className={`p-5 rounded-full shadow-md mb-6 transition-transform ${isDragging ? 'bg-blue-500 text-white scale-110' : 'bg-white text-blue-500 group-hover:scale-110'}`}>
                      <UploadCloud size={48} strokeWidth={2} />
                    </div>
                    <p className={`text-2xl font-bold mb-2 ${isDragging ? 'text-blue-700' : 'text-slate-700'}`}>
                      {isDragging ? "파일을 여기에 내려놓으세요!" : "견적서 파일을 이곳에 드래그하거나 클릭"}
                    </p>
                    <p className="text-slate-400 font-medium">PDF 문서, JPG, PNG 파일 완벽 지원</p>
                  </div>
                )}
              </div>
            </div>

            {/* Cloud History Section */}
            <div className="w-full max-w-6xl bg-white rounded-[2rem] shadow-lg p-8 md:p-12 border border-slate-100">
              <div className="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
                <div className="flex items-center gap-4">
                  <div className="p-3 bg-slate-100 text-slate-600 rounded-xl"><FolderOpen size={24} /></div>
                  <h2 className="text-2xl font-bold text-slate-800">나의 클라우드 프로젝트</h2>
                </div>
                <span className="bg-emerald-100 text-emerald-800 px-4 py-1.5 rounded-full text-sm font-bold">
                  저장됨 {history.length}건
                </span>
              </div>
              
              {history.length > 0 ? (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                  {history.map(item => (
                    <div key={item.id} 
                         onClick={() => { setQuotes(item.quotes); setView('dashboard'); showToast(`프로젝트를 불러왔습니다.`); }} 
                         className="p-6 bg-slate-50 border border-slate-200 rounded-2xl hover:border-blue-500 hover:shadow-lg transition-all cursor-pointer group flex flex-col justify-between h-full">
                      <div>
                        <div className="flex items-center gap-3 mb-3">
                          <div className="p-2 bg-blue-100 text-blue-600 rounded-lg"><FileText size={18} /></div>
                          <h3 className="font-bold text-slate-800 group-hover:text-blue-600 text-lg line-clamp-1">{item.title}</h3>
                        </div>
                        <p className="text-xs text-slate-500 font-medium bg-slate-200/50 inline-block px-3 py-1 rounded-md mb-4">
                          비교 업체: {item.quotes.length}곳
                        </p>
                      </div>
                      <div className="flex justify-between items-center text-sm font-bold border-t border-slate-200 pt-4 mt-auto">
                        <span className="text-slate-400 flex items-center gap-1.5"><Clock size={14}/> {new Date(item.createdAt).toLocaleDateString()}</span>
                        <span className="text-blue-700">열기 ➔</span>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="py-16 flex flex-col items-center justify-center text-slate-400 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                  <FolderOpen size={48} className="mb-4 opacity-50" />
                  <p className="text-lg font-medium">저장된 데이터가 없습니다.</p>
                  <p className="text-sm mt-1">상단에서 견적서를 업로드하여 첫 분석을 시작해보세요.</p>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ==========================================
      // VIEW 2: 대시보드 (분석 결과 및 비교)
      // ==========================================
      if (view === 'dashboard') {
        const sortedQuotes = [...quotes].sort((a,b) => a.total - b.total);
        const lowestQuote = sortedQuotes[0];
        const highestQuote = sortedQuotes[sortedQuotes.length - 1];

        return (
          <div className="min-h-screen bg-slate-50 p-4 md:p-8 animate-fade-in font-sans text-slate-800">
            <div className="max-w-7xl mx-auto space-y-8">
              
              {/* 상단 컨트롤 바 */}
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center gap-4">
                  <button onClick={() => { setQuotes([]); setView('upload'); }} className="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors text-slate-600">
                    <ArrowLeft size={20} />
                  </button>
                  <div>
                    <h1 className="text-2xl font-bold flex items-center gap-2"><BarChart3 className="text-blue-600" /> AI 비교 분석 리포트</h1>
                    <p className="text-sm text-slate-500 font-medium mt-1">현재 {quotes.length}개의 견적서가 분석되었습니다.</p>
                  </div>
                </div>
                <div className="flex gap-3 w-full md:w-auto">
                  <button onClick={() => { if(!isAnalyzing) fileInputRef.current?.click(); }} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl font-bold cursor-pointer hover:bg-blue-100 transition-colors">
                    <Plus size={18} /> 추가 비교
                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileChange} accept=".pdf,image/jpeg,image/png,image/webp" />
                  </button>
                  <button onClick={()=>setIsSaveModal(true)} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-colors shadow-md">
                    <Save size={18}/> 결과 저장
                  </button>
                </div>
              </div>

              {isAnalyzing && (
                 <div className="bg-blue-600 text-white p-4 rounded-xl flex items-center justify-center gap-3 font-bold animate-pulse shadow-lg">
                   <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                   추가된 견적서를 AI가 분석하고 있습니다...
                 </div>
              )}

              {/* KPI 섹션 (2개 이상일 때 비교 활성화) */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-24 h-24 bg-emerald-100 rounded-bl-full -z-0 opacity-50"></div>
                  <p className="text-slate-500 text-sm font-bold mb-2 flex items-center gap-1.5"><CheckCircle size={16} className="text-emerald-500"/> 최저가 업체</p>
                  <h3 className="text-2xl font-extrabold text-slate-900 mb-1 z-10 relative">{lowestQuote?.name || '-'}</h3>
                  <p className="text-emerald-600 text-xl font-bold">₩ {formatCurrency(lowestQuote?.total)}</p>
                </div>
                
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <p className="text-slate-500 text-sm font-bold mb-2 flex items-center gap-1.5"><AlertTriangle size={16} className="text-amber-500"/> 최고가 업체</p>
                  <h3 className="text-2xl font-extrabold text-slate-900 mb-1">{highestQuote?.name || '-'}</h3>
                  <p className="text-amber-600 text-xl font-bold">₩ {formatCurrency(highestQuote?.total)}</p>
                </div>
                
                <div className="bg-slate-900 p-6 rounded-2xl shadow-sm text-white">
                  <p className="text-slate-400 text-sm font-bold mb-2 flex items-center gap-1.5"><TrendingDown size={16} className="text-blue-400"/> 최대 비용 절감액</p>
                  <h3 className="text-3xl font-extrabold text-white mt-3">
                    {quotes.length > 1 ? `₩ ${formatCurrency(highestQuote?.total - lowestQuote?.total)}` : '비교 대상 없음'}
                  </h3>
                  <p className="text-slate-400 text-xs mt-2">{quotes.length > 1 ? '최고가 대비 최저가 선택 시' : '추가 버튼을 눌러 견적서를 비교하세요'}</p>
                </div>
              </div>

              {/* 차트 및 세부 정보 */}
              {quotes.length > 1 ? (
                <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                  <h3 className="text-xl font-bold mb-8 text-slate-800">📊 업체별 견적 총액 비교</h3>
                  <div className="h-80 w-full">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={quotes} margin={{top:20, right:20, left:20, bottom:0}}>
                        <CartesianGrid vertical={false} stroke="#f1f5f9" />
                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#64748b', fontWeight:600}} />
                        <YAxis hide />
                        <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius:'12px', border:'none', boxShadow:'0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                        <Legend wrapperStyle={{paddingTop: '20px'}}/>
                        <Bar dataKey="totalSupply" name="공급가액" stackId="a" fill="#3b82f6" radius={[0,0,4,4]} barSize={60} />
                        <Bar dataKey="vat" name="부가세" stackId="a" fill="#93c5fd" radius={[4,4,0,0]} barSize={60}>
                           <LabelList dataKey="total" position="top" formatter={v=>`${formatCurrency(v)}원`} style={{fontWeight:'bold', fill:'#0f172a', fontSize:'13px'}}/>
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              ) : (
                <div className="bg-blue-50/50 border border-blue-100 p-8 rounded-2xl text-center">
                  <p className="text-blue-800 font-bold mb-2">단일 견적서가 분석되었습니다.</p>
                  <p className="text-blue-600 text-sm">상단의 '추가 비교' 버튼을 눌러 다른 견적서를 업로드하면 그래프로 비교할 수 있습니다.</p>
                </div>
              )}

              {/* 업체별 리스트 */}
              <div className="space-y-4">
                <h3 className="text-xl font-bold text-slate-800 px-2">📑 상세 견적 리스트</h3>
                {quotes.map(quote => (
                  <div key={quote.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col md:flex-row items-center p-4 gap-6">
                    <div className="flex-1 w-full pl-2">
                      <div className="flex items-center gap-3 mb-1">
                        <h4 className="text-lg font-extrabold text-slate-900">{quote.name}</h4>
                        {quote.id === lowestQuote?.id && quotes.length > 1 && (
                           <span className="bg-emerald-100 text-emerald-700 text-xs font-bold px-2 py-1 rounded-md">최저가</span>
                        )}
                      </div>
                      <div className="flex gap-4 text-sm text-slate-500 font-medium">
                        <span>항목: {quote.items?.length || 0}개</span>
                        <span>공급가액: ₩ {formatCurrency(quote.totalSupply)}</span>
                      </div>
                    </div>
                    <div className="text-right w-full md:w-auto px-4">
                      <p className="text-xs text-slate-400 font-bold mb-1">총 합계 (VAT 포함)</p>
                      <p className="text-2xl font-black text-slate-800">₩ {formatCurrency(quote.total)}</p>
                    </div>
                    <div className="flex gap-2 w-full md:w-auto border-t md:border-t-0 md:border-l border-slate-100 pt-4 md:pt-0 md:pl-6">
                      <button 
                        onClick={() => { setSelectedCompanyId(quote.id); setView('calculator'); }}
                        className="flex-1 flex items-center justify-center gap-1.5 px-4 py-2.5 bg-blue-50 text-blue-700 font-bold rounded-xl hover:bg-blue-100 transition-colors whitespace-nowrap"
                      >
                        <Edit3 size={16}/> 상세 수정
                      </button>
                      <button 
                        onClick={() => handleDeleteQuote(quote.id)}
                        className="p-2.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-colors"
                        title="비교에서 제외"
                      >
                        <Trash2 size={20}/>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 클라우드 저장 모달 */}
            {isSaveModal && (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-[100] animate-fade-in">
                <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-slate-100">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                      <Save className="text-emerald-500"/> 클라우드 저장
                    </h3>
                  </div>
                  <p className="text-sm text-slate-500 mb-6 font-medium">현재 비교 중인 {quotes.length}개의 견적 데이터를 하나의 프로젝트로 묶어 구글 시트에 안전하게 보관합니다.</p>
                  
                  <label className="block text-sm font-bold text-slate-700 mb-2">프로젝트 제목</label>
                  <input 
                    type="text" value={saveTitle} onChange={e=>setSaveTitle(e.target.value)} 
                    placeholder="예: 2026년 OO현장 자재 단가 비교" 
                    className="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl mb-8 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 font-medium text-slate-800 transition-all" 
                    autoFocus 
                  />
                  <div className="flex gap-3">
                    <button onClick={()=>setIsSaveModal(false)} className="flex-1 py-3.5 bg-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors">취소</button>
                    <button onClick={handleSave} disabled={isLoading} className="flex-1 py-3.5 bg-emerald-600 text-white rounded-xl font-bold shadow-md hover:bg-emerald-700 transition-colors">
                      {isLoading ? "동기화 중..." : "저장 완료"}
                    </button>
                  </div>
                </div>
              </div>
            )}
            {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-xl shadow-2xl z-[100] font-bold animate-fade-in flex items-center gap-2"><CheckCircle size={18} className="text-emerald-400"/> {toast}</div>}
          </div>
        );
      }

      // ==========================================
      // VIEW 3: 상세 내역 수정 (계산기)
      // ==========================================
      if (view === 'calculator') {
        const company = quotes.find(q => q.id === selectedCompanyId);
        return <CalculatorView company={company} onBack={() => setView('dashboard')} onSave={handleUpdateQuote} />;
      }
    }

    // --- Sub-component: Calculator ---
    function CalculatorView({ company, onBack, onSave }) {
      const [items, setItems] = useState([...(company.items || [])]);

      const handleItemChange = (idx, field, value) => {
        setItems(prev => {
          const newItems = [...prev];
          const val = Number(value) || 0;
          newItems[idx] = { ...newItems[idx], [field]: val };
          if (field === 'qty' || field === 'unitPrice') {
            newItems[idx].total = newItems[idx].qty * newItems[idx].unitPrice;
          }
          return newItems;
        });
      };

      const handleAddItem = () => {
        setItems([...items, { id: Date.now(), name: "추가 품목", spec: "", unit: "식", qty: 1, unitPrice: 0, total: 0 }]);
      };

      const handleRemoveItem = (idx) => {
        setItems(prev => prev.filter((_, i) => i !== idx));
      };

      const totalSupply = items.reduce((sum, item) => sum + (item.total || 0), 0);
      const vat = totalSupply * 0.1;
      const total = totalSupply + vat;

      const handleSaveClick = () => {
        onSave({ ...company, items, totalSupply, vat, total });
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            
            {/* Header */}
            <div className="p-6 md:p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50">
              <div className="flex items-center gap-4 w-full md:w-auto">
                <button onClick={onBack} className="p-2 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                <div>
                  <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2"><Edit3 className="text-blue-600"/> {company.name} 상세 내역</h2>
                  <p className="text-sm text-slate-500 font-medium mt-1">AI가 추출한 항목입니다. 수량 및 단가를 수정하여 재계산할 수 있습니다.</p>
                </div>
              </div>
              <button onClick={handleSaveClick} className="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition-colors">
                <CheckCircle size={18}/> 수정 완료
              </button>
            </div>

            {/* Table */}
            <div className="p-6 md:p-8 overflow-x-auto">
              <table className="w-full text-left border-collapse min-w-[700px]">
                <thead>
                  <tr className="bg-slate-100 text-slate-600 text-sm">
                    <th className="p-4 font-bold rounded-tl-xl">품명 및 규격</th>
                    <th className="p-4 font-bold text-center">수량</th>
                    <th className="p-4 font-bold text-right">단가 (원)</th>
                    <th className="p-4 font-bold text-right">합계 (원)</th>
                    <th className="p-4 font-bold text-center rounded-tr-xl w-12"></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {items.map((item, idx) => (
                    <tr key={idx} className="hover:bg-slate-50/80 transition-colors">
                      <td className="p-4">
                        <div className="font-bold text-slate-800 text-base mb-1">{item.name}</div>
                        <div className="text-xs text-slate-400">{item.spec || '-'} {item.unit ? `(${item.unit})` : ''}</div>
                      </td>
                      <td className="p-4 w-32">
                        <input type="number" value={item.qty} onChange={(e) => handleItemChange(idx, 'qty', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 w-40 text-right">
                        <input type="number" value={item.unitPrice} onChange={(e) => handleItemChange(idx, 'unitPrice', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-right font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 text-right font-bold text-blue-700 text-lg">
                        {formatCurrency(item.total)}
                      </td>
                      <td className="p-4 text-center">
                        <button onClick={() => handleRemoveItem(idx)} className="text-slate-300 hover:text-rose-500 p-1 transition-colors"><X size={18}/></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              
              <button onClick={handleAddItem} className="mt-4 flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-800 p-2 transition-colors">
                <Plus size={16}/> 품목 추가하기
              </button>
            </div>

            {/* Summary Footer */}
            <div className="bg-slate-900 p-6 md:p-8 text-white flex flex-col md:flex-row justify-end items-end md:items-center gap-6">
              <div className="text-right text-slate-400 text-sm font-medium">
                <p className="mb-1">공급가액: ₩ {formatCurrency(totalSupply)}</p>
                <p>부가세(10%): ₩ {formatCurrency(vat)}</p>
              </div>
              <div className="text-right">
                <p className="text-slate-400 text-sm font-bold mb-1">총 합계 (VAT 포함)</p>
                <p className="text-3xl md:text-4xl font-black text-emerald-400">₩ {formatCurrency(total)}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
