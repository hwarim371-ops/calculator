<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화림건설 AI 견적 분석기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { background-color: #f1f5f9; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .loader-ring {
      display: inline-block; width: 50px; height: 50px;
      border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LabelList, Legend } from "https://esm.sh/recharts@2.12.3?deps=react@18.2.0,react-dom@18.2.0";
    import { UploadCloud, CheckCircle, ArrowLeft, Calculator, BarChart3, Edit3, Save, X, Plus, AlertTriangle, TrendingDown, Trash, Info, HardDrive, Camera, Download, FolderOpen, History, ExternalLink, RefreshCw, Ruler, ClipboardCheck, Award, Search } from "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0";

    // =========================================================================
    // ⚙️ 연동 설정
    // =========================================================================
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzqbSb9pBnjgjiVNuY64eMrIzqHIYtVqoqA0DC8U-hMXUEh2huKsGFMzZMlJLmcWvV0/exec";
    const apiKey = "AIzaSyDr7CmU4fof2d8L-IbjK8kG5o34ia3Ge6I";
    const GEMINI_MODEL = apiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
    // =========================================================================

    const formatCurrency = (num) => new Intl.NumberFormat('ko-KR').format(Math.round(num || 0));
    const formatMan = (num) => `${Math.round((num || 0) / 10000).toLocaleString('ko-KR')}만`;

    const fetchWithBackoff = async (url, options) => {
  const MAX_RETRIES = 3;
  for (let i = 0; i < MAX_RETRIES; i++) {
    try {
      const response = await fetch(url, options);
      if (response.ok) return response;
      const errText = await response.text();
      console.error(`[API Error ${response.status} - 시도 ${i+1}]`, errText);
      // 400(키 오류)은 재시도 무의미 → 즉시 실패
      if (response.status === 400 || response.status === 403) {
        throw new Error(`HTTP Error: ${response.status} - ${errText}`);
      }
      // 429(할당량) → 60초 대기 후 재시도
      if (response.status === 429) {
        if (i === MAX_RETRIES - 1) throw new Error(`HTTP Error: ${response.status} - ${errText}`);
        console.warn(`[429] 할당량 초과. 65초 대기 후 재시도...`);
        await new Promise(resolve => setTimeout(resolve, 65000));
        continue;
      }
      if (i === MAX_RETRIES - 1) throw new Error(`HTTP Error: ${response.status} - ${errText}`);
    } catch (error) {
      if (i === MAX_RETRIES - 1) throw error;
    }
    await new Promise(resolve => setTimeout(resolve, 3000 * (i + 1)));
  }
};

    const categorizeItems = (items) => {
      let material = 0, delivery = 0, labor = 0, etc = 0;
      (items || []).forEach(item => {
        const text = `${item.name || ''} ${item.spec || ''}`.toLowerCase();
        const amt = Number(item.total) || 0;
        if (/운반|운임|배송|택배|화물|물류/.test(text)) delivery += amt;
        else if (/설치|시공|공임|노무|인건|조립/.test(text)) labor += amt;
        else if (/할인|단수|조정|차감|쿠폰/.test(text)) etc += amt;
        else material += amt;
      });
      return { material, delivery, labor, etc };
    };

    function App() {
      const [quotes, setQuotes] = useState(() => {
        try {
          const s = localStorage.getItem('hwarim_quotes');
          return s ? JSON.parse(s) : [];
        } catch { return []; }
      });

      const [view, setView] = useState(() => {
        try {
          const s = localStorage.getItem('hwarim_quotes');
          const q = s ? JSON.parse(s) : [];
          return q.length > 0 ? 'dashboard' : 'upload';
        } catch { return 'upload'; }
      });

      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analyzeProgress, setAnalyzeProgress] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState('');
      const [saveTitle, setSaveTitle] = useState('');
      const [isSaveModal, setIsSaveModal] = useState(false);
      const [selectedCompanyId, setSelectedCompanyId] = useState(null);
      const [driveErrorModal, setDriveErrorModal] = useState(false);
      const [isCapturing, setIsCapturing] = useState(false);
      const [savedList, setSavedList] = useState([]);
      const [isLoadingList, setIsLoadingList] = useState(false);
      const [loadedFolderName, setLoadedFolderName] = useState('');
      const [imageViewModal, setImageViewModal] = useState({ open: false, quote: null });
      const [searchTerm, setSearchTerm] = useState('');

      const fileInputRef = useRef(null);
      const reportRef = useRef(null);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 5000); };

      useEffect(() => {
        const preventDefault = (e) => e.preventDefault();
        window.addEventListener('dragover', preventDefault);
        window.addEventListener('drop', preventDefault);
        return () => {
          window.removeEventListener('dragover', preventDefault);
          window.removeEventListener('drop', preventDefault);
        };
      }, []);

      useEffect(() => {
        const slim = quotes.map(({ originalFile, ...rest }) => rest);
        try { localStorage.setItem('hwarim_quotes', JSON.stringify(slim)); } catch (e) {}
      }, [quotes]);

      useEffect(() => {
        if (view === 'upload') loadSavedList(true);
      }, [view]);

      const captureReport = async () => {
        if (!reportRef.current) return showToast("❌ 캡처할 영역을 찾지 못했습니다.");
        if (!window.html2canvas) return showToast("❌ 캡처 라이브러리 로딩 중입니다.");
        setIsCapturing(true);
        showToast("📸 전체 리포트 캡처 중...");
        try {
          const canvas = await window.html2canvas(reportRef.current, {
            scale: 2, backgroundColor: '#f1f5f9', useCORS: true, allowTaint: true,
            scrollX: 0, scrollY: 0,
            width: reportRef.current.scrollWidth,
            height: reportRef.current.scrollHeight,
            windowWidth: reportRef.current.scrollWidth
          });
          const dateStr = new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g, '-').replace(/-$/, '');
          const link = document.createElement('a');
          link.download = `화림건설_견적비교_${dateStr}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
          showToast("✅ PNG 이미지가 다운로드 되었습니다!");
        } catch (err) {
          console.error("캡처 오류:", err);
          showToast("❌ 캡처 실패.");
        } finally {
          setIsCapturing(false);
        }
      };

      // ====================================================================
      // AI 분석 (Gemini)
      // ====================================================================
      const analyzeSingleFile = (file) => {
        return new Promise((resolve, reject) => {
          let mimeType = file.type;
          const fileName = file.name.toLowerCase();
          if (mimeType === 'image/jpg') mimeType = 'image/jpeg';
          if (!mimeType) {
            if (fileName.endsWith('.pdf')) mimeType = 'application/pdf';
            else if (fileName.endsWith('.png')) mimeType = 'image/png';
            else if (fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) mimeType = 'image/jpeg';
            else if (fileName.endsWith('.webp')) mimeType = 'image/webp';
            else mimeType = 'application/octet-stream';
          }
          const reader = new FileReader();
          reader.onerror = () => resolve({
            name: file.name.replace(/\.[^/.]+$/, '') || "알 수 없는 업체",
            totalSupply: 0, vat: 0, total: 0,
            summary: "파일을 읽을 수 없습니다.", keyFeature: "",
            items: []
          });
          reader.onload = async () => {
            const base64Data = reader.result.split(',')[1];
            const originalFileContext = { name: file.name, type: mimeType, base64: base64Data };
            try {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
              const payload = {
                contents: [{
                  role: "user",
                  parts: [
                    { text: `당신은 한국 건설업계 자재 견적서를 수천 장 분석한 전문가입니다. 첨부된 한국어 견적서(PDF/이미지)를 아래 규칙대로 정확히 추출하세요.

【업체명 판별 (가장 중요)】
- 견적을 "발행한" 공급자 상호만 추출 (예: "경상스틸(주)", "(주)한일티앤에이치", "청계산업")
- 발행자 단서: 로고·직인·사업자등록번호·대표이사·"위와 같이 견적합니다" 근처 상호
- "귀하"·"귀중"·"TO:" 뒤의 이름은 수신자(고객)이므로 절대 업체명이 아님
- "화림건설"은 견적 수신자(고객사)이므로 업체명으로 절대 선택 금지
- 판별 불가 시 빈 문자열 반환 (추측 금지)

【items 추출 규칙】
실제 "구매 품목 행"만 추출. 다음은 items에 절대 포함 금지:
- 합계/소계/총계/계 행
- "A동", "B동", "1층" 같은 섹션 헤더 (단독으로 수량·단가 없는 행)
- 빈 행, "-", "이 하 여 백" 같은 구분자
- "단수정리", "할인" 같은 금액 조정은 별도 items로 넣지 말고 totalSupply에만 반영

각 품목 7필드 필수:
- id: 1부터 일련번호
- name: 품명 (섹션명+품명 합쳐도 됨. 예: "A동 졸탑(베이지) 0.4mm")
- spec: 규격 (예: "6900*3200", "HD16 8", "SD400 16D")
- unit: 단위 ("장","개","식","세트","KG","EA")
- qty: 수량 (숫자만)
- unitPrice: 단가 (콤마·원·₩ 제거한 순수 숫자)
- total: 품목 금액 (명시 우선, 없으면 qty*unitPrice)

운반비·배송비·설치비는 별도 items로 포함 (name: "운반비", unit: "식", qty: 1 등)

【금액】
- totalSupply: 공급가액(VAT 제외). 할인 반영된 최종 공급가액
- vat: 부가세(명시 없으면 10%)
- total: VAT 포함 총액
- 한글 금액표기는 참고만, 아라비아 숫자 우선
- 숫자는 반드시 숫자 타입 (콤마·원·₩ 제거)

【summary (1~2줄)】
납기·결제조건·할인·배송비·방염/방수/항균·유효기간·비고란 중 실제 적힌 것만 간결히. 없으면 "".

【keyFeature (★ 필수, 매우 짧게)】
이 견적의 핵심 차별점을 **한 줄 15자 내외**로 요약. 예시:
- "투명/지퍼 등 세부옵션 반영가"
- "국산원단 방염/방수/항균 처리"
- "단수정리 할인 적용(-14,000원)"
- "선금 결제 조건, 유효 15일"
- "철근 KS SD400 16D 주력"
없으면 "".

【출력】
순수 JSON만 반환하세요. 마크다운 코드블록이나 불필요한 텍스트는 절대 포함하지 마세요.` },
                    { inlineData: { mimeType: mimeType, data: base64Data } }
                  ]
                }],
                generationConfig: {
                  responseMimeType: "application/json",
                  responseSchema: {
                    type: "OBJECT",
                    properties: {
                      name: { type: "STRING" },
                      totalSupply: { type: "NUMBER" },
                      vat: { type: "NUMBER" },
                      total: { type: "NUMBER" },
                      summary: { type: "STRING" },
                      keyFeature: { type: "STRING" },
                      items: {
                        type: "ARRAY",
                        items: {
                          type: "OBJECT",
                          properties: {
                            id: { type: "NUMBER" },
                            name: { type: "STRING" },
                            spec: { type: "STRING" },
                            unit: { type: "STRING" },
                            qty: { type: "NUMBER" },
                            unitPrice: { type: "NUMBER" },
                            total: { type: "NUMBER" }
                          }
                        }
                      }
                    },
                    required: ["name", "totalSupply", "vat", "total", "summary", "keyFeature", "items"]
                  }
                }
              };
              const response = await fetchWithBackoff(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              const result = await response.json();
              if (!result.candidates || result.candidates.length === 0) throw new Error("EMPTY_CANDIDATES");
              let jsonText = result.candidates[0]?.content?.parts[0]?.text;
              if (!jsonText) throw new Error("EMPTY_RESPONSE");
              jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();
              const parsedData = JSON.parse(jsonText);
              if (!parsedData.name || parsedData.name.trim() === '' || parsedData.name === '알 수 없음') {
                parsedData.name = file.name.replace(/\.[^/.]+$/, '');
              }
              if (parsedData.total === 0 && parsedData.totalSupply > 0) {
                parsedData.vat = Math.round(parsedData.totalSupply * 0.1);
                parsedData.total = parsedData.totalSupply + parsedData.vat;
              }
              if (Array.isArray(parsedData.items)) {
                parsedData.items = parsedData.items.map((it, idx) => ({
                  id: it.id || idx + 1,
                  name: it.name || '',
                  spec: it.spec || '',
                  unit: it.unit || '',
                  qty: Number(it.qty) || 0,
                  unitPrice: Number(it.unitPrice) || 0,
                  total: (it.total && it.total > 0) ? Number(it.total) : (Number(it.qty) || 0) * (Number(it.unitPrice) || 0)
                }));
              }
              resolve({ ...parsedData, originalFile: originalFileContext });
            } catch (err) {
              console.error("[AI 분석 실패]", file.name, err);
              resolve({
                name: file.name.replace(/\.[^/.]+$/, '') || "분석 실패",
                totalSupply: 0, vat: 0, total: 0,
                summary: `⚠️ AI 분석 실패. API 키 오류 또는 할당량 초과입니다. (${err.message})`,
                keyFeature: "",
                items: [],
                originalFile: originalFileContext,
                _analysisError: true
              });
            }
          };
          reader.readAsDataURL(file);
        });
      };

      const processFiles = async (fileList) => {
        const filesArray = Array.from(fileList);
        if (filesArray.length === 0) return;
        setIsAnalyzing(true);
        const newQuotes = [];
        let successCount = 0;
        let failCount = 0;
        for (let i = 0; i < filesArray.length; i++) {
          const file = filesArray[i];
          setAnalyzeProgress(`[${i + 1} / ${filesArray.length}] ${file.name} 분석 중...`);
      // 두 번째 파일부터 3초 간격으로 요청 (rate limit 방지)
      if (i > 0) await new Promise(resolve => setTimeout(resolve, 3000));
      try {
        const parsedData = await analyzeSingleFile(file);
            let finalName = parsedData.name;
            const existingNames = [...quotes, ...newQuotes].map(q => q.name);
            if (existingNames.includes(finalName)) {
              let cnt = 2;
              while (existingNames.includes(`${finalName} (${cnt})`)) cnt++;
              finalName = `${finalName} (${cnt})`;
            }
            const newQuote = { id: Date.now().toString() + i, ...parsedData, name: finalName };
            newQuotes.push(newQuote);
            if (parsedData._analysisError) failCount++;
            else successCount++;
          } catch (e) {
            failCount++;
          }
        }
        if (newQuotes.length > 0) {
          setQuotes(prev => [...prev, ...newQuotes]);
          setView('dashboard');
          if (failCount > 0) {
            showToast(`✅ ${successCount}개 분석 완료 / ⚠️ ${failCount}개 실패 (콘솔 오류 및 계산기 확인)`);
          } else {
            showToast(`✅ 총 ${successCount}개의 견적서가 분석되었습니다!`);
          }
        }
        setIsAnalyzing(false);
        setAnalyzeProgress('');
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const handleFileChange = (e) => {
        if (e.target.files && e.target.files.length > 0) {
          processFiles(e.target.files);
          e.target.value = '';
        }
      };

      const onDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); };
      const onDrop = (e) => {
        e.preventDefault(); e.stopPropagation(); setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) processFiles(e.dataTransfer.files);
      };

      // 드라이브 저장
      const handleSave = async () => {
        if (!saveTitle.trim()) return showToast("저장할 프로젝트(폴더) 이름을 입력해주세요.");
        const filesToUpload = quotes.map(q => q.originalFile).filter(Boolean);
        const hasAnalysis = quotes.length > 0;
        if (filesToUpload.length === 0 && !hasAnalysis) {
          return showToast("⚠️ 저장할 내용이 없습니다.");
        }
        setIsLoading(true);
        try {
          const analysisData = quotes.map(({ originalFile, ...rest }) => rest);
          const withUnit = analysisData.filter(q => q.unitRecord?.price > 0);
          let bestUnitPrice = null;
          if (withUnit.length > 0) {
            const best = withUnit.reduce((a, b) => a.unitRecord.price < b.unitRecord.price ? a : b);
            bestUnitPrice = { name: best.name, price: best.unitRecord.price, basis: best.unitRecord.basis };
          }
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "saveFiles", title: saveTitle, files: filesToUpload, analysisData, bestUnitPrice })
          });
          let result;
          try {
            result = await response.json();
          } catch (jsonErr) {
            setDriveErrorModal(true);
            setIsSaveModal(false);
            return;
          }
          if (result && result.success) {
            setIsSaveModal(false);
            setSaveTitle('');
            const msg = filesToUpload.length > 0
              ? `✅ 원본 ${filesToUpload.length}개 + 분석결과 저장 완료!`
              : `✅ 분석결과 저장 완료!`;
            showToast(msg);
            loadSavedList(true);
          } else {
            setDriveErrorModal(true);
            setIsSaveModal(false);
          }
        } catch (e) {
          setDriveErrorModal(true);
          setIsSaveModal(false);
        } finally {
          setIsLoading(false);
        }
      };

      const handleUpdateQuote = (updatedQuote) => {
        setQuotes(prev => prev.map(q => q.id === updatedQuote.id ? updatedQuote : q));
        setView('dashboard');
        showToast(`${updatedQuote.name}의 상세 내역이 갱신되었습니다.`);
      };

      const handleDeleteQuote = (id) => {
        const newQuotes = quotes.filter(q => q.id !== id);
        setQuotes(newQuotes);
        showToast("비교 대상에서 제외되었습니다.");
        if (newQuotes.length === 0) {
          localStorage.removeItem('hwarim_quotes');
          setLoadedFolderName('');
          setView('upload');
        }
      };

      const handleUnitRecordUpdate = (quoteId, field, value) => {
        setQuotes(prev => prev.map(q => {
          if (q.id !== quoteId) return q;
          const cur = q.unitRecord || { basis: 'm²', price: 0 };
          return { ...q, unitRecord: { ...cur, [field]: field === 'price' ? (Number(value) || 0) : value } };
        }));
      };

      // 저장 목록 관리
      const loadSavedList = async (silent = false) => {
        if (!silent) setIsLoadingList(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "listSaves" })
          });
          const result = await response.json();
          if (result && result.success) {
            setSavedList(result.items || []);
            if (!silent) setView('history');
          } else if (!silent) {
            setDriveErrorModal(true);
          }
        } catch (e) {
          if (!silent) setDriveErrorModal(true);
        } finally {
          if (!silent) setIsLoadingList(false);
        }
      };

      const loadSavedProject = async (folderId, folderName) => {
        setIsLoading(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "loadSave", folderId })
          });
          const result = await response.json();
          if (result && result.success && Array.isArray(result.analysisData)) {
            const restored = result.analysisData.map((q, i) => ({
              ...q,
              id: q.id || (Date.now().toString() + i)
            }));
            setQuotes(restored);
            setLoadedFolderName(result.folderName || folderName || '');
            setView('dashboard');
            showToast(`✅ "${result.folderName}" 불러오기 완료 (${restored.length}개 견적)`);
          } else {
            showToast(`❌ 불러오기 실패: ${result.error || "알 수 없는 오류"}`);
          }
        } catch (e) {
          showToast("❌ 서버 통신 오류");
        } finally {
          setIsLoading(false);
        }
      };

      const deleteSavedProject = async (folderId, folderName) => {
        if (!confirm(`"${folderName}"\n\n정말 이 저장분을 삭제하시겠어요?\n(구글 드라이브 휴지통으로 이동됩니다)`)) return;
        setIsLoadingList(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "deleteSave", folderId })
          });
          const result = await response.json();
          if (result && result.success) {
            setSavedList(prev => prev.filter(item => item.id !== folderId));
            showToast(`✅ ${result.message}`);
          } else {
            showToast(`❌ 삭제 실패: ${result.error || "알 수 없는 오류"}`);
          }
        } catch (e) {
          showToast("❌ 서버 통신 오류");
        } finally {
          setIsLoadingList(false);
        }
      };

      const filteredSavedList = savedList.filter(item =>
        item.name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      // ==========================================
      // VIEW 1: 업로드
      // ==========================================
      if (view === 'upload') {
        return (
          <div className="min-h-screen flex flex-col items-center py-10 px-4 md:px-12 animate-fade-in text-slate-800">
            <div className="w-full max-w-6xl mb-12 text-center">
              <div className="inline-flex items-center justify-center p-4 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-600/20 mb-6">
                <Calculator size={36} strokeWidth={2.5} />
              </div>
              <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900">
                화림건설 AI 견적 분석기
              </h1>
              <p className="text-lg text-slate-500 font-medium">
                분석할 견적서를 올리고, 원본 파일을 구글 드라이브에 바로 백업하세요.
              </p>
            </div>

            <div className="w-full max-w-4xl glass-effect bg-white/80 rounded-[2rem] shadow-2xl p-8 md:p-14 mb-8 border border-white">
              <label
                className={`group relative flex flex-col items-center justify-center w-full h-80 border-2 border-dashed rounded-3xl transition-all cursor-pointer overflow-hidden ${isDragging ? 'border-blue-500 bg-blue-100 scale-[1.02]' : 'border-blue-200 bg-blue-50/30 hover:bg-blue-50/80 hover:border-blue-400'}`}
                onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
              >
                <input type="file" className="hidden" multiple onChange={handleFileChange} accept=".pdf,image/*" disabled={isAnalyzing} ref={fileInputRef} />
                {isAnalyzing ? (
                  <div className="flex flex-col items-center z-10">
                    <div className="loader-ring mb-6"></div>
                    <p className="text-2xl font-bold text-blue-700 mb-2">AI가 문서를 정밀 분석 중입니다...</p>
                    <p className="text-slate-600 font-bold bg-white/50 px-4 py-1.5 rounded-full">{analyzeProgress}</p>
                  </div>
                ) : (
                  <div className="flex flex-col items-center z-10 transition-transform group-hover:-translate-y-2 pointer-events-none">
                    <div className={`p-5 rounded-full shadow-md mb-6 transition-transform ${isDragging ? 'bg-blue-500 text-white scale-110' : 'bg-white text-blue-500 group-hover:scale-110'}`}>
                      <UploadCloud size={48} strokeWidth={2} />
                    </div>
                    <p className={`text-2xl font-bold mb-2 ${isDragging ? 'text-blue-700' : 'text-slate-700'}`}>
                      {isDragging ? "파일들을 여기에 내려놓으세요!" : "여러 개의 견적서를 한 번에 드래그하거나 클릭"}
                    </p>
                    <p className="text-slate-400 font-medium">PDF 문서 및 각종 사진 파일 동시 업로드 지원</p>
                  </div>
                )}
              </label>
            </div>

            <div className="w-full max-w-4xl bg-blue-50/50 rounded-3xl border border-blue-100 p-8 text-center shadow-sm mb-8">
              <div className="flex justify-center mb-4 text-blue-500"><HardDrive size={40} /></div>
              <h3 className="text-xl font-bold text-blue-900 mb-2">구글 드라이브 원본 다이렉트 업로드 지원</h3>
              <p className="text-blue-700 font-medium">분석이 끝난 후 <b>'드라이브 저장'</b> 버튼을 누르면, 원본 견적서(PDF, 이미지)와 AI 분석결과가 구글 드라이브 <b>'화림건설 견적분석기'</b> 폴더에 안전하게 업로드됩니다.</p>
            </div>

            {savedList.length > 0 && (
              <div className="w-full max-w-4xl">
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="px-6 md:px-8 py-5 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between bg-slate-50/50 gap-4">
                    <div>
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <History className="text-blue-600" size={22}/> 저장된 분석 내역
                      </h3>
                      <p className="text-sm text-slate-500 font-medium mt-1">
                        총 <b className="text-blue-600">{savedList.length}</b>개 · '불러오기'를 누르면 대시보드로 복원됩니다
                      </p>
                    </div>
                    <div className="flex gap-2 w-full md:w-auto">
                      <div className="relative flex-1 md:w-64">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                          <Search size={16} className="text-slate-400"/>
                        </div>
                        <input
                          type="text"
                          placeholder="프로젝트 검색..."
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                          className="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm font-medium"
                        />
                      </div>
                      <button onClick={() => loadSavedList(true)} className="p-2.5 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-xl transition-colors shrink-0" title="목록 새로고침">
                        <RefreshCw size={18} className={isLoadingList ? "animate-spin" : ""}/>
                      </button>
                    </div>
                  </div>
                  <div className="divide-y divide-slate-100 max-h-[520px] overflow-y-auto custom-scrollbar">
                    {filteredSavedList.length > 0 ? (
                      filteredSavedList.map(item => (
                        <div key={item.id} className="px-6 md:px-8 py-4 hover:bg-slate-50 transition-colors">
                          <div className="flex items-center justify-between gap-3">
                            <div className="flex-1 min-w-0">
                              <h4 className="font-bold text-slate-900 truncate mb-1">{item.name}</h4>
                              <div className="flex flex-wrap gap-x-3 gap-y-1 text-xs text-slate-500 font-medium">
                                <span>📅 {new Date(item.createdAt).toLocaleString('ko-KR', {dateStyle:'medium', timeStyle:'short'})}</span>
                                <span>📄 원본 {item.fileCount}개</span>
                                <span>📊 견적 {item.quoteCount}개</span>
                                {item.lowestName && item.lowestTotal !== null && (
                                  <span className="text-emerald-600 font-bold">💰 {item.lowestName} (₩{formatCurrency(item.lowestTotal)})</span>
                                )}
                                {item.bestUnitPrice && item.bestUnitPrice.price > 0 && (
                                  <span className="text-blue-600 font-bold">
                                    💡 단가 {formatCurrency(item.bestUnitPrice.price)}원/{item.bestUnitPrice.basis} ({item.bestUnitPrice.name})
                                  </span>
                                )}
                              </div>
                            </div>
                            <div className="flex gap-1.5 flex-shrink-0">
                              <button onClick={() => loadSavedProject(item.id, item.name)} disabled={!item.hasAnalysis || isLoading}
                                className="px-3 md:px-4 py-2 bg-blue-600 text-white text-sm rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-sm disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap flex items-center gap-1"
                                title={item.hasAnalysis ? "이 분석 불러오기" : "분석결과 없음"}>
                                <FolderOpen size={14}/> <span className="hidden md:inline">불러오기</span>
                              </button>
                              <a href={item.url} target="_blank" rel="noopener noreferrer"
                                className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="구글 드라이브에서 열기">
                                <ExternalLink size={16}/>
                              </a>
                              <button onClick={() => deleteSavedProject(item.id, item.name)}
                                className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors" title="삭제 (휴지통)">
                                <Trash size={16}/>
                              </button>
                            </div>
                          </div>
                        </div>
                      ))
                    ) : (
                      <div className="p-8 text-center text-slate-500 font-medium">검색 결과가 없습니다.</div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-xl shadow-2xl z-[100] font-bold animate-fade-in flex items-center gap-2"><CheckCircle size={18} className="text-emerald-400"/> {toast}</div>}

            {driveErrorModal && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-slate-200">
                  <div className="p-6 bg-rose-50 border-b border-rose-100 flex items-center gap-3">
                    <AlertTriangle className="text-rose-600" size={32} />
                    <h3 className="text-2xl font-extrabold text-rose-800 tracking-tight">구글 드라이브 통신 오류</h3>
                  </div>
                  <div className="p-8 text-slate-700 space-y-4 font-medium">
                    <p className="text-lg">연결된 구글 앱스 스크립트(GAS) 설정이 올바르지 않거나 권한이 없습니다.</p>
                  </div>
                  <div className="p-5 bg-slate-50 border-t border-slate-200 flex justify-end">
                    <button onClick={() => setDriveErrorModal(false)} className="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors shadow-md">확인</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ==========================================
      // VIEW 2: 대시보드
      // ==========================================
      if (view === 'dashboard') {
        const sortedQuotes = [...quotes].sort((a, b) => a.total - b.total);
        const lowestQuote = sortedQuotes[0];
        const highestQuote = sortedQuotes[sortedQuotes.length - 1];

        const chartData = quotes.map(q => {
          const c = categorizeItems(q.items);
          return {
            name: q.name,
            자재비: c.material + c.etc,
            운반시공: c.delivery + c.labor,
            부가세: q.vat || 0,
            total: q.total,
          };
        });

        const detectSpecMixing = () => {
          const units = new Set();
          quotes.forEach(q => {
            (q.items || []).forEach(it => {
              const spec = (it.spec || '').toString();
              if (/\d+\s*\*\s*\d+/.test(spec)) {
                const nums = spec.match(/\d+/g) || [];
                const maxNum = Math.max(...nums.map(Number));
                if (maxNum >= 1000) units.add('mm');
                else if (maxNum >= 100) units.add('cm');
              }
            });
          });
          return units.size > 1 ? Array.from(units).join(' / ') : null;
        };
        const specMixing = detectSpecMixing();

        return (
          <div className="min-h-screen bg-slate-50 p-4 md:p-8 animate-fade-in font-sans text-slate-800">
            <div className="max-w-7xl mx-auto space-y-6">

              {/* 상단 컨트롤 바 */}
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center gap-4">
                  <button
                    onClick={() => { setQuotes([]); localStorage.removeItem('hwarim_quotes'); setLoadedFolderName(''); setView('upload'); }}
                    className="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors text-slate-600"
                    title="초기화 후 업로드 화면으로">
                    <ArrowLeft size={20} />
                  </button>
                  <div>
                    <h1 className="text-2xl font-bold flex items-center gap-2 flex-wrap">
                      <BarChart3 className="text-blue-600" /> AI 비교 분석 리포트
                      {loadedFolderName && (
                        <span className="text-xs bg-blue-100 text-blue-700 px-2.5 py-1 rounded-md font-bold" title="구글 드라이브에서 불러온 저장분">
                          📂 {loadedFolderName}
                        </span>
                      )}
                    </h1>
                    <p className="text-sm text-slate-500 font-medium mt-1">현재 {quotes.length}개의 견적서 데이터가 활성화되어 있습니다.</p>
                  </div>
                </div>
                <div className="flex flex-wrap gap-3 w-full md:w-auto">
                  <button onClick={() => loadSavedList(false)} disabled={isLoadingList}
                    className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition-colors shadow-sm disabled:opacity-60">
                    <History size={18}/> 저장 목록
                  </button>
                  <label className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl font-bold cursor-pointer hover:bg-blue-100 transition-colors">
                    <Plus size={18} /> 추가 비교
                    <input type="file" multiple className="hidden" onChange={handleFileChange} accept=".pdf,image/*" disabled={isAnalyzing} />
                  </label>
                  <button onClick={() => setIsSaveModal(true)}
                    className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-colors shadow-md">
                    <Save size={18}/> 드라이브 저장
                  </button>
                  <button onClick={captureReport} disabled={isCapturing}
                    className="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-colors shadow-md disabled:opacity-60">
                    {isCapturing
                      ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> 캡처 중...</>
                      : <><Camera size={18}/> 이미지 캡처</>}
                  </button>
                </div>
              </div>

              {isAnalyzing && (
                <div className="bg-blue-600 text-white p-4 rounded-xl flex items-center justify-center gap-3 font-bold animate-pulse shadow-lg">
                  <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                  {analyzeProgress}
                </div>
              )}

              {/* 캡처 대상 영역 */}
              <div ref={reportRef} className="space-y-6 bg-slate-50 p-2 rounded-2xl">

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white rounded-2xl shadow-sm border-l-4 border-emerald-500 p-6">
                    <p className="text-slate-500 text-sm font-bold mb-2 flex items-center gap-1.5">
                      <CheckCircle size={16} className="text-emerald-500"/> 최저가 제안 업체
                    </p>
                    <h3 className="text-2xl font-extrabold text-slate-900 mb-1">{lowestQuote?.name || '-'}</h3>
                    <p className="text-emerald-600 text-xl font-bold">
                      ₩ {formatCurrency(lowestQuote?.total)} <span className="text-xs text-slate-400">(VAT포함)</span>
                    </p>
                  </div>
                  <div className="bg-white rounded-2xl shadow-sm border-l-4 border-rose-500 p-6">
                    <p className="text-slate-500 text-sm font-bold mb-2 flex items-center gap-1.5">
                      <AlertTriangle size={16} className="text-rose-500"/> 최고가 제안 업체
                    </p>
                    <h3 className="text-2xl font-extrabold text-slate-900 mb-1">{highestQuote?.name || '-'}</h3>
                    <p className="text-rose-500 text-xl font-bold">
                      ₩ {formatCurrency(highestQuote?.total)} <span className="text-xs text-slate-400">(VAT포함)</span>
                    </p>
                  </div>
                  <div className="bg-white rounded-2xl shadow-sm border-l-4 border-blue-500 p-6">
                    <p className="text-slate-500 text-sm font-bold mb-2 flex items-center gap-1.5">
                      <TrendingDown size={16} className="text-blue-500"/> 예상 절감액 (최고가 대비)
                    </p>
                    <h3 className="text-3xl font-extrabold text-blue-600 mt-2">
                      {quotes.length > 1 ? `₩ ${formatCurrency(highestQuote?.total - lowestQuote?.total)}` : '비교 대상 부족'}
                    </h3>
                    <p className="text-slate-400 text-xs mt-1">
                      {quotes.length > 1 ? '최저가 선택 시 절감 가능 비용' : '2개 이상의 견적서를 업로드해주세요'}
                    </p>
                  </div>
                </div>

                {/* 스택 바 차트 */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                  <h3 className="text-2xl font-bold text-slate-800 mb-2">📊 업체별 견적 구성 비교</h3>
                  {quotes.length > 0 ? (
                    <div className="h-[450px] w-full mt-4">
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={chartData} margin={{top: 30, right: 30, left: 20, bottom: 20}}>
                          <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" vertical={false}/>
                          <XAxis dataKey="name" tick={{ fontSize: 14, fontWeight: 'bold', fill: '#475569' }} axisLine={false} tickLine={false} dy={10}/>
                          <YAxis tickFormatter={(v) => `${(v/10000).toFixed(0)}만`} tick={{ fontSize: 13, fill: '#94a3b8', fontWeight: 'bold' }} axisLine={false} tickLine={false} dx={-10}/>
                          <Tooltip
                            formatter={(value, name) => [`₩ ${formatCurrency(value)}`, name]}
                            cursor={{ fill: 'rgba(59,130,246,0.05)' }}
                            contentStyle={{ borderRadius: '16px', border: 'none', fontWeight: 'bold', boxShadow: '0 10px 25px rgba(0,0,0,0.1)', padding: '12px 20px' }}
                            itemStyle={{ fontSize: '15px', padding: '4px 0' }}
                          />
                          <Legend wrapperStyle={{ paddingTop: '20px', fontWeight: 'bold', fontSize: '14px' }} iconType="circle" />
                          <Bar dataKey="자재비" stackId="a" fill="#3b82f6" radius={[0,0,0,0]} barSize={80}>
                            <LabelList dataKey="자재비" position="center" formatter={(v)=> (v && v > 500000) ? formatMan(v) : ''} style={{fontSize:13, fontWeight:'bold', fill:'#fff'}}/>
                          </Bar>
                          <Bar dataKey="운반시공" stackId="a" fill="#10b981" barSize={80}>
                            <LabelList dataKey="운반시공" position="center" formatter={(v)=> (v && v > 300000) ? formatMan(v) : ''} style={{fontSize:13, fontWeight:'bold', fill:'#fff'}}/>
                          </Bar>
                          <Bar dataKey="부가세" stackId="a" fill="#94a3b8" radius={[12,12,0,0]} barSize={80}>
                            <LabelList dataKey="total" position="top" formatter={(v)=> v ? `₩${formatCurrency(v)}` : ''} style={{fontSize:14, fontWeight:'900', fill:'#1e293b'}} offset={15}/>
                          </Bar>
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  ) : (
                    <div className="bg-blue-50/50 border border-blue-100 p-8 rounded-2xl text-center h-60 flex flex-col items-center justify-center mt-4">
                      <p className="text-blue-800 font-bold">분석된 견적서가 없습니다.</p>
                    </div>
                  )}
                </div>

                {/* AI 분석 리포트 */}
                <div className="bg-slate-800 rounded-2xl shadow-sm p-6 md:p-8 text-white">
                  <h3 className="text-lg font-bold mb-5 flex items-center gap-2 text-blue-300">
                    <Info size={20} /> AI 분석 리포트
                  </h3>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div className="bg-slate-700/50 rounded-xl p-5 border border-slate-700">
                      <div className="flex items-center gap-2 mb-3">

                      <tbody className="divide-y divide-slate-100">

                    </table>
                  </div>
                </div>

              </div>{/* end reportRef */}
            </div>

            {/* 드라이브 저장 모달 */}
            {isSaveModal && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] animate-fade-in">

                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                      <HardDrive className="text-blue-600"/> 원본 파일 드라이브 업로드
                    </h3>
                  </div>
                  <p className="text-sm text-slate-500 mb-2 font-medium">분석 원본 파일과 AI 분석결과가 <b>구글 드라이브 → 화림건설 견적분석기</b> 폴더에 저장됩니다.</p>
                  <label className="block text-sm font-bold text-slate-700 mb-2">생성할 폴더 이름</label>
                  <input type="text" value={saveTitle} onChange={e => setSaveTitle(e.target.value)}
                    placeholder="예: 2026년 OO현장 자재 단가 비교"
                    className="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl mb-8 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 font-medium text-slate-800 transition-all"
                    autoFocus onKeyDown={e => { if (e.key === 'Enter') handleSave(); }}/>
                  <div className="flex gap-3">
                    <button onClick={() => setIsSaveModal(false)} className="flex-1 py-3.5 bg-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors">취소</button>
                    <button onClick={handleSave} disabled={isLoading} className="flex-1 py-3.5 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 transition-colors disabled:opacity-60">
                      {isLoading ? "업로드 중..." : "드라이브에 저장"}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ✅ 원본 파일 뷰어 모달 */}
            {imageViewModal.open && imageViewModal.quote && (() => {
              const f = imageViewModal.quote.originalFile;
              const isImage = f?.type?.startsWith('image/');
              const isPdf = f?.type === 'application/pdf';
              const dataUrl = f ? `data:${f.type};base64,${f.base64}` : '';
              return (
                <div
                  className="fixed inset-0 z-[300] flex items-center justify-center bg-black/75 p-4 backdrop-blur-sm animate-fade-in"

                    className="relative bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden flex flex-col"

                        <h3 className="text-lg font-bold text-slate-800">{imageViewModal.quote.name}</h3>

                      </div>
                      <div className="flex items-center gap-2">
                        {dataUrl && (
                          <a
                            href={dataUrl}

                            <Download size={14}/> 다운로드
                          </a>
                        )}
                        <button
                          onClick={() => setImageViewModal({ open: false, quote: null })}

                        <iframe src={dataUrl} className="w-full rounded-lg bg-white" style={{ height: '70vh' }} title={f?.name}/>
                      ) : (
                        <div className="text-center text-slate-500 p-12">
                          <HardDrive size={48} className="mx-auto mb-4 text-slate-300"/>

                          <p className="text-sm text-slate-400">{f?.type || '알 수 없는 형식'}</p>
                        </div>
                      )}

              );

                  </div>
                  <div className="p-5 bg-slate-50 border-t border-slate-200 flex justify-end">
                    <button onClick={() => setDriveErrorModal(false)} className="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors shadow-md">확인</button>
                  </div>
                </div>
              </div>
            )}

            {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-xl shadow-2xl z-[100] font-bold animate-fade-in flex items-center gap-2"><CheckCircle size={18} className="text-emerald-400"/> {toast}</div>}
          </div>
        );
      }

      // ==========================================
      // VIEW: 저장 목록 (History)
      // ==========================================
      if (view === 'history') {
        return (
          <div className="min-h-screen bg-slate-50 p-4 md:p-8 animate-fade-in font-sans text-slate-800">
            <div className="max-w-5xl mx-auto space-y-6">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center gap-4">
                  <button onClick={() => setView(quotes.length > 0 ? 'dashboard' : 'upload')}
                    className="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors text-slate-600" title="뒤로가기">
                    <ArrowLeft size={20} />
                  </button>
                  <h1 className="text-2xl font-bold flex items-center gap-2">
                    <History className="text-blue-600" /> 저장된 분석 목록
                  </h1>
                </div>
                <div className="flex gap-2 w-full md:w-auto">
                  <div className="relative flex-1 md:w-64">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Search size={16} className="text-slate-400"/>
                    </div>
                    <input
                      type="text"
                      placeholder="프로젝트 검색..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm font-medium"
                    />
                  </div>
                  <button onClick={() => loadSavedList(false)} disabled={isLoadingList}
                    className="flex items-center gap-2 px-4 py-2 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors disabled:opacity-60 shrink-0">
                    <RefreshCw size={16} className={isLoadingList ? "animate-spin" : ""}/>
                  </button>
                </div>
              </div>

              {isLoadingList ? (
                <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center">
                  <div className="loader-ring mx-auto mb-4"></div>
                  <p className="text-slate-500 font-medium">구글 드라이브에서 불러오는 중...</p>
                </div>
              ) : savedList.length === 0 ? (
                <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center">
                  <FolderOpen size={48} className="mx-auto text-slate-300 mb-4"/>
                  <p className="text-lg font-bold text-slate-600 mb-1">아직 저장된 분석이 없습니다</p>
                </div>
              ) : filteredSavedList.length === 0 ? (
                <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center">
                  <Search size={48} className="mx-auto text-slate-300 mb-4"/>
                  <p className="text-lg font-bold text-slate-600 mb-1">검색 결과가 없습니다</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {filteredSavedList.map(item => (
                    <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 hover:shadow-md hover:border-blue-300 transition-all">
                      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="flex-1 min-w-0">
                          <h3 className="text-lg font-bold text-slate-900 mb-2 break-all">{item.name}</h3>
                          <div className="flex flex-wrap gap-x-4 gap-y-1 text-sm text-slate-500 font-medium">
                            <span>📅 {new Date(item.createdAt).toLocaleString('ko-KR', {dateStyle:'medium', timeStyle:'short'})}</span>
                            <span>📄 원본 {item.fileCount}개</span>
                            <span>📊 견적 {item.quoteCount}개</span>
                            {item.lowestName && item.lowestTotal !== null && (
                              <span className="text-emerald-600 font-bold">💰 {item.lowestName} (₩{formatCurrency(item.lowestTotal)})</span>
                            )}
                            {item.bestUnitPrice && item.bestUnitPrice.price > 0 && (
                              <span className="text-blue-600 font-bold">
                                💡 단가 {formatCurrency(item.bestUnitPrice.price)}원/{item.bestUnitPrice.basis} ({item.bestUnitPrice.name})
                              </span>
                            )}
                          </div>
                        </div>
                        <div className="flex gap-2 flex-shrink-0 flex-wrap">
                          <button onClick={() => loadSavedProject(item.id, item.name)} disabled={!item.hasAnalysis || isLoading}
                            className="flex items-center gap-1.5 px-4 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-sm disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap">
                            <FolderOpen size={16}/> 불러오기
                          </button>
                          <button onClick={() => deleteSavedProject(item.id, item.name)}
                            className="p-2.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-colors" title="삭제">
                            <Trash size={18}/>
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }

      // ==========================================
      // VIEW: 계산기
      // ==========================================
      if (view === 'calculator') {
        const company = quotes.find(q => q.id === selectedCompanyId);
        if (!company) { setView('dashboard'); return null; }
        return <CalculatorView company={company} onBack={() => setView('dashboard')} onSave={handleUpdateQuote} />;
      }
    }

    // --- Calculator ---
    function CalculatorView({ company, onBack, onSave }) {
      const [items, setItems] = useState([...(company.items || [])]);

      const handleItemChange = (idx, field, value) => {
        setItems(prev => {
          const newItems = [...prev];
          if (field === 'name' || field === 'spec' || field === 'unit') {
            newItems[idx] = { ...newItems[idx], [field]: value };
          } else {
            const val = Number(value) || 0;
            newItems[idx] = { ...newItems[idx], [field]: val };
            if (field === 'qty' || field === 'unitPrice') {
              newItems[idx].total = newItems[idx].qty * newItems[idx].unitPrice;
            }
          }
          return newItems;
        });
      };

      const handleAddItem = () => {
        setItems([...items, { id: Date.now(), name: "추가 품목", spec: "", unit: "식", qty: 1, unitPrice: 0, total: 0 }]);
      };

      const handleRemoveItem = (idx) => {
        setItems(prev => prev.filter((_, i) => i !== idx));
      };

      const totalSupply = items.reduce((sum, item) => sum + (item.total || 0), 0);
      const vat = Math.round(totalSupply * 0.1);
      const total = totalSupply + vat;

      const handleSaveClick = () => {
        onSave({ ...company, items, totalSupply, vat, total });
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-6 md:p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50">
              <div className="flex items-center gap-4 w-full md:w-auto">
                <button onClick={onBack} className="p-2 bg-white border border-slate-200 hover:bg-slate-100 rounded-xl transition-colors"><ArrowLeft size={20}/></button>
                <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2"><Edit3 className="text-blue-600"/> {company.name} 상세 내역</h2>
              </div>
              <button onClick={handleSaveClick} className="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition-colors">
                <CheckCircle size={18}/> 수정 완료
              </button>
            </div>

            <div className="p-6 md:p-8 overflow-x-auto">
              <table className="w-full text-left border-collapse min-w-[700px]">
                <thead>
                  <tr className="bg-slate-100 text-slate-600 text-sm">
                    <th className="p-4 font-bold rounded-tl-xl">품명 및 규격</th>
                    <th className="p-4 font-bold text-center">수량</th>
                    <th className="p-4 font-bold text-right">단가 (원)</th>
                    <th className="p-4 font-bold text-right">합계 (원)</th>
                    <th className="p-4 font-bold text-center rounded-tr-xl w-12">삭제</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {items.map((item, idx) => (
                    <tr key={idx} className="hover:bg-slate-50/80 transition-colors">
                      <td className="p-4">
                        <div className="font-bold text-slate-800 text-base mb-1">
                          <input type="text" value={item.name} onChange={(e) => handleItemChange(idx, 'name', e.target.value)} className="bg-transparent w-full outline-none" />
                        </div>
                        <div className="text-xs text-slate-400 flex gap-2">
                          <input type="text" value={item.spec || ''} placeholder="규격" onChange={(e) => handleItemChange(idx, 'spec', e.target.value)} className="bg-transparent outline-none flex-1"/>
                          <input type="text" value={item.unit || ''} placeholder="단위" onChange={(e) => handleItemChange(idx, 'unit', e.target.value)} className="bg-transparent outline-none w-16"/>
                        </div>
                      </td>
                      <td className="p-4 w-32">
                        <input type="number" value={item.qty} onChange={(e) => handleItemChange(idx, 'qty', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 w-40 text-right">
                        <input type="number" value={item.unitPrice} onChange={(e) => handleItemChange(idx, 'unitPrice', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-right font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                      </td>
                      <td className="p-4 text-right font-bold text-blue-700 text-lg">
                        {formatCurrency(item.total)}
                      </td>
                      <td className="p-4 text-center">
                        <button onClick={() => handleRemoveItem(idx)} className="text-slate-300 hover:text-rose-500 p-1 transition-colors"><Trash size={18}/></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <button onClick={handleAddItem} className="mt-4 flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-800 p-2 transition-colors">
                <Plus size={16}/> 품목 추가하기
              </button>
            </div>

            <div className="bg-slate-900 p-6 md:p-8 text-white flex flex-col md:flex-row justify-end items-end md:items-center gap-6">
              <div className="text-right text-slate-400 text-sm font-medium">
                <p className="mb-1">공급가액: ₩ {formatCurrency(totalSupply)}</p>
                <p>부가세(10%): ₩ {formatCurrency(vat)}</p>
              </div>
              <div className="text-right">
                <p className="text-slate-400 text-sm font-bold mb-1">총 합계 (VAT 포함)</p>
                <p className="text-3xl md:text-4xl font-black text-emerald-400">₩ {formatCurrency(total)}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
